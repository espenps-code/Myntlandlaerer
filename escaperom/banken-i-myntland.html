  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

FF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\u002F* latin *\u002F\n@font-face {\n  font-family: 'Fredoka';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: normal;\n  font-display: swap;\n  src: url(\"f0234932-57c8-472e-82b2-5cb5a884475b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{\n  --natt:#171A3E;\n  --natt-dyp:#0F1130;\n  --panel:#262A52;\n  --panel-lys:#31366B;\n  --gull:#FFC83D;\n  --gull-lys:#FFE9AE;\n  --gull-dyp:#E0A82E;\n  --tekst:#F2F0FF;\n  --tekst-demp:#A9ACD6;\n  --bolge:#3EC6C9;\n  --drage:#FF6B4A;\n  --maane:#9B7BFF;\n  --stjerne:#FF7BAC;\n  --gronn:#4FD08C;\n  --rod:#FF5C7A;\n  --radius:18px;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{background:var(--natt-dyp)}\nhtml,body{height:100%}\nbody{\n  font-family:'Atkinson Hyperlegible',system-ui,sans-serif;\n  background:\n    radial-gradient(1100px 520px at 50% -8%, #2E3370 0%, transparent 62%),\n    radial-gradient(900px 700px at 108% 104%, #202452 0%, transparent 55%),\n    linear-gradient(180deg, var(--natt) 0%, var(--natt-dyp) 100%);\n  color:var(--tekst);\n  min-height:100vh;\n  line-height:1.5;\n  overflow-x:hidden;\n}\nh1,h2,h3,.fredoka{font-family:'Fredoka','Atkinson Hyperlegible',sans-serif}\n.skjerm{display:none;max-width:880px;margin:0 auto;padding:24px 18px 60px;position:relative}\n.skjerm.aktiv{display:block;animation:inn .45s cubic-bezier(.2,.9,.3,1.15)}\n@keyframes inn{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}\n@media (prefers-reduced-motion: reduce){\n  *,*::before,*::after{animation:none!important;transition:none!important}\n  #himmel .svevemynt{display:none}\n}\n\n\u002F* ===== Myntland-himmel (bakgrunnslag) ===== *\u002F\n#himmel{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}\n.glod{position:absolute;border-radius:50%;filter:blur(70px);animation:glodDrift 16s ease-in-out infinite alternate}\n.glod.g1{width:48vw;height:48vw;left:-14vw;top:-16vw;background:radial-gradient(circle,rgba(255,200,61,.16),transparent 70%)}\n.glod.g2{width:42vw;height:42vw;right:-15vw;top:10vh;background:radial-gradient(circle,rgba(62,198,201,.13),transparent 70%);animation-delay:-5s}\n.glod.g3{width:52vw;height:52vw;left:22vw;bottom:-30vw;background:radial-gradient(circle,rgba(155,123,255,.12),transparent 70%);animation-delay:-9s}\n@keyframes glodDrift{to{transform:translate(5vw,4vh) scale(1.12)}}\n.stjernedryss{position:absolute;inset:0;opacity:.9;\n  background-image:\n    radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,.7) 50%, transparent 55%),\n    radial-gradient(2px 2px at 28% 64%, rgba(255,255,255,.5) 50%, transparent 55%),\n    radial-gradient(1.5px 1.5px at 41% 32%, rgba(255,233,174,.8) 50%, transparent 55%),\n    radial-gradient(2px 2px at 57% 12%, rgba(255,255,255,.6) 50%, transparent 55%),\n    radial-gradient(1.5px 1.5px at 66% 78%, rgba(255,255,255,.45) 50%, transparent 55%),\n    radial-gradient(2px 2px at 78% 41%, rgba(255,233,174,.7) 50%, transparent 55%),\n    radial-gradient(1.5px 1.5px at 90% 22%, rgba(255,255,255,.6) 50%, transparent 55%),\n    radial-gradient(1.5px 1.5px at 8% 85%, rgba(255,255,255,.5) 50%, transparent 55%),\n    radial-gradient(2px 2px at 47% 88%, rgba(255,233,174,.55) 50%, transparent 55%),\n    radial-gradient(1.5px 1.5px at 84% 70%, rgba(255,255,255,.5) 50%, transparent 55%);\n  animation:blunk 5s ease-in-out infinite alternate}\n@keyframes blunk{to{opacity:.45}}\n.svevemynt{position:absolute;left:var(--x);bottom:-70px;font-size:var(--s);opacity:0;\n  animation:stig var(--t) linear infinite;animation-delay:var(--dly)}\n@keyframes stig{\n  0%{transform:translateY(0) rotate(0);opacity:0}\n  6%{opacity:var(--o)}\n  88%{opacity:var(--o)}\n  100%{transform:translateY(-118vh) rotate(360deg);opacity:0}\n}\n\n\u002F* ===== Bilder ===== *\u002F\n.scenebilde{\n  display:block;width:100%;max-width:640px;margin:0 auto 18px;\n  border-radius:var(--radius);\n  border:3px solid transparent;\n  background:\n    linear-gradient(var(--panel),var(--panel)) padding-box,\n    linear-gradient(135deg, var(--gull-dyp), #3C4280 38%, #4A4F92 62%, var(--gull-dyp)) border-box;\n  box-shadow:0 14px 36px rgba(0,0,0,.5);aspect-ratio:4\u002F3;object-fit:cover;\n}\n.scenebilde.liten{max-width:480px}\n\n\u002F* ===== Topplinje med timer ===== *\u002F\n#topplinje{\n  position:sticky;top:0;z-index:50;display:none;\n  background:rgba(20,22,50,.88);backdrop-filter:blur(8px);\n  border-bottom:1px solid rgba(255,200,61,.28);\n  box-shadow:0 10px 28px -14px rgba(0,0,0,.7);\n  padding:10px 16px;\n}\n#topplinje.vis{display:flex;align-items:center;justify-content:space-between;gap:12px}\n#timer{\n  display:flex;align-items:center;gap:8px;\n  font-family:'Fredoka',sans-serif;font-size:1.5rem;font-weight:700;\n  color:var(--gull);letter-spacing:.06em;min-width:120px;\n  text-shadow:0 0 18px rgba(255,200,61,.35);\n}\n#timer::before{content:\"🪙\";font-size:1.05rem;filter:drop-shadow(0 0 6px rgba(255,200,61,.6))}\n#timer.haster{color:var(--rod);text-shadow:0 0 18px rgba(255,92,122,.5);animation:pulse 1s infinite}\n@keyframes pulse{50%{opacity:.45}}\n#gruppevisning{color:var(--tekst-demp);font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.toppknapper{display:flex;gap:8px}\n.toppknapp{\n  background:var(--panel-lys);border:1px solid #3F4486;color:var(--tekst);\n  font-family:'Atkinson Hyperlegible',sans-serif;font-weight:700;\n  padding:8px 14px;border-radius:12px;cursor:pointer;font-size:.9rem;\n  transition:background .15s, transform .15s;\n}\n.toppknapp:hover{background:#3C4280;transform:translateY(-1px)}\n.toppknapp:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--gull);outline-offset:2px}\n\n\u002F* ===== Les hoyt-knapp ===== *\u002F\n.lytt{\n  display:inline-flex;align-items:center;gap:6px;\n  background:var(--panel-lys);border:1px solid #3F4486;color:var(--tekst);\n  font-family:'Atkinson Hyperlegible',sans-serif;font-weight:700;font-size:.9rem;\n  padding:8px 16px;border-radius:999px;cursor:pointer;margin-top:10px;\n  transition:background .15s, transform .15s;\n}\n.lytt:hover{background:#3C4280;transform:translateY(-1px)}\n\n\u002F* ===== Startskjerm ===== *\u002F\n#start{padding-top:36px;text-align:center}\n.hvelv-ikon{font-size:4rem;margin-bottom:10px;display:inline-block;animation:dupp 3s ease-in-out infinite}\n#start h1{\n  font-size:clamp(2.1rem,6vw,3.4rem);line-height:1.12;margin-bottom:14px;\n  background:linear-gradient(100deg,var(--gull-lys) 0%,var(--gull) 26%,var(--gull-dyp) 42%,var(--gull-lys) 58%,var(--gull) 84%,var(--gull-lys) 100%);\n  background-size:220% 100%;\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  animation:gullSkinn 5.5s linear infinite;\n  filter:drop-shadow(0 2px 0 rgba(0,0,0,.4)) drop-shadow(0 0 26px rgba(255,200,61,.22));\n}\n@keyframes gullSkinn{to{background-position:-220% 0}}\n\n\u002F* Hvelvhjul-hero *\u002F\n.hvelvhjul{width:148px;height:148px;margin:0 auto 16px;position:relative}\n.hjul-ring{\n  position:absolute;inset:0;border-radius:50%;\n  background:radial-gradient(circle at 32% 28%, #4A5099, var(--panel) 72%);\n  border:6px solid #3C4280;\n  box-shadow:0 0 0 4px var(--natt), 0 0 44px rgba(255,200,61,.22), 0 14px 30px rgba(0,0,0,.5), inset 0 0 26px rgba(0,0,0,.55);\n}\n.hjul-ring::before{\n  content:\"\";position:absolute;inset:6px;border-radius:50%;\n  background:repeating-conic-gradient(from 0deg, rgba(255,200,61,.75) 0deg 3deg, transparent 3deg 30deg);\n  -webkit-mask:radial-gradient(circle, transparent 60%, #000 62%);\n  mask:radial-gradient(circle, transparent 60%, #000 62%);\n}\n.hjul-eiker{\n  position:absolute;inset:30px;border-radius:50%;\n  background:\n    radial-gradient(circle, var(--gull-lys) 0 13%, var(--gull-dyp) 13% 18%, transparent 19%),\n    linear-gradient(0deg, transparent 45.5%, var(--gull-dyp) 45.5% 54.5%, transparent 54.5%),\n    linear-gradient(60deg, transparent 45.5%, var(--gull-dyp) 45.5% 54.5%, transparent 54.5%),\n    linear-gradient(120deg, transparent 45.5%, var(--gull-dyp) 45.5% 54.5%, transparent 54.5%);\n  border:7px solid var(--gull-dyp);\n  box-shadow:0 4px 10px rgba(0,0,0,.45), inset 0 0 8px rgba(0,0,0,.3);\n  animation:hjulSnurr 22s linear infinite;\n}\n@keyframes hjulSnurr{to{transform:rotate(360deg)}}\n.hjul-nav{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.7rem;filter:drop-shadow(0 0 10px rgba(255,200,61,.55))}\n\n\u002F* Monsterparade *\u002F\n.monsterrad{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 24px}\n.m-chip{\n  display:inline-flex;align-items:center;gap:8px;padding:7px 16px 7px 10px;border-radius:999px;\n  background:color-mix(in oklab, var(--c) 14%, var(--panel));\n  border:2px solid color-mix(in oklab, var(--c) 55%, transparent);\n  box-shadow:0 6px 16px -8px color-mix(in oklab, var(--c) 50%, transparent);\n  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;color:var(--tekst);\n  animation:dupp 3.2s ease-in-out infinite;animation-delay:calc(var(--i) * .45s);\n}\n.m-fjes{font-size:1.3rem;filter:drop-shadow(0 0 7px var(--c))}\n\n.intro{\n  background:linear-gradient(160deg,#2B2F60, var(--panel) 58%);\n  border-radius:var(--radius);\n  padding:20px 22px;text-align:left;margin:0 auto 26px;max-width:640px;\n  border:2px solid var(--panel-lys);font-size:1.05rem;\n  box-shadow:0 16px 38px -18px rgba(0,0,0,.7);\n}\n.intro p+p{margin-top:10px}\n.felt{max-width:640px;margin:0 auto 22px;text-align:left}\n.felt label{display:block;font-weight:700;margin-bottom:8px;color:var(--tekst-demp);text-transform:uppercase;font-size:.82rem;letter-spacing:.08em}\n#gruppenavn{\n  width:100%;padding:14px 16px;border-radius:14px;border:2px solid var(--panel-lys);\n  background:var(--panel) ont-family:'Fredoka',sans-serif;font-weight:700;\n  font-size:1.1rem;padding:12px 26px;cursor:pointer;\n  box-shadow:0 4px 0 #9C7314;transition:transform .1s;\n}\n.sjekk-knapp:active{transform:translateY(3px);box-shadow:0 1px 0 #9C7314}\n.tilbake{\n  background:none;border:2px solid var(--panel-lys);color:var(--tekst-demp);\n  border-radius:12px;padding:9px 16px;cursor:pointer;font-weight:700;margin-bottom:18px;\n  font-family:'Atkinson Hyperlegible',sans-serif;font-size:.95rem;\n  transition:border-color .15s, color .15s;\n}\n.tilbake:hover{border-color:var(--tekst-demp);color:var(--tekst)}\n.melding{margin-top:14px;padding:14px 16px;border-radius:14px;font-weight:700;display:none}\n.melding.feil{display:block;background:rgba(255,92,122,.14);border:2px solid var(--rod);color:#FFB3C2}\n.melding.riktig{display:block;background:rgba(79,208,140,.14);border:2px solid var(--gronn);color:#A9F0CC;font-size:1.15rem;box-shadow:0 0 24px -8px rgba(79,208,140,.4)}\n.hint-knapp{\n  display:none;margin-top:12px;background:var(--panel-lys);border:1px solid #3F4486;color:var(--tekst);\n  padding:10px 18px;border-radius:12px;cursor:pointer;font-weight:700;\n  font-family:'Atkinson Hyperlegible',sans-serif;font-size:.95rem;\n}\n.hint-knapp:hover{background:#3C4280}\n.hint-knapp.vis{display:inline-block}\n.hint-tekst{\n  display:none;margin-top:12px;background:rgba(255,200,61,.1);\n  border:2px dashed var(--gull);border-radius:14px;padding:14px 16px;color:#FFE3A0;\n}\n.hint-tekst.vis{display:block}\n.skjelv{animation:skjelv .4s}\n@keyframes skjelv{\n  0%,100%{transform:translateX(0)}\n  20%{transform:translateX(-8px)}40%{transform:translateX(8px)}\n  60%{transform:translateX(-5px)}80%{transform:translateX(5px)}\n}\n\n\u002F* ===== Hvelvskjerm ===== *\u002F\n#hvelv{text-align:center;padding-top:24px}\n#hvelv h2{color:var(--gull);font-size:1.8rem;margin:14px 0 6px;text-shadow:0 0 22px rgba(255,200,61,.3)}\n#hvelv .undertekst{color:var(--tekst-demp);margin-bottom:22px}\n#hvelvIkon{font-size:3.4rem;display:inline-block;filter:drop-shadow(0 0 16px rgba(255,200,61,.4))}\n#hvelvIkon.snurrer{animation:laasSnurr 1.4s ease-in-out}\n@keyframes laasSnurr{30%{transform:rotate(-30deg)}60%{transform:rotate(380deg)}100%{transform:rotate(360deg)}}\n.kode-rad{display:flex;gap:12px;justify-content:center;margin-bottom:24px}\n.kode-input{\n  width:64px;height:80px;text-align:center;font-size:2.2rem;\n  font-family:'Fredoka',sans-serif;font-weight:700;\n  border-radius:16px;border:3px solid var(--panel-lys);\n  background:radial-gradient(circle at 35% 25%, #2E3367, var(--natt) 78%);\n  color:var(--gull);\n  box-shadow:inset 0 4px 12px rgba(0,0,0,.55);\n  transition:border-color .15s, box-shadow .15s;\n}\n.kode-input:focus{border-color:var(--gull);box-shadow:0 0 0 4px rgba(255,200,61,.18), inset 0 4px 12px rgba(0,0,0,.55);outline:none}\n.kode-input.gronn{border-color:var(--gronn);color:var(--gronn);box-shadow:0 0 22px -4px rgba(79,208,140,.6), inset 0 4px 12px rgba(0,0,0,.55)}\n@media(max-width:420px){.kode-input{width:54px;height:68px;font-size:1.8rem}}\n\n\u002F* ===== Slutt-\u002Fdiplomskjerm ===== *\u002F\n#vunnet,#tapt{text-align:center;padding-top:30px}\n.diplom{\n  position:relative;max-width:560px;margin:24px auto 0;\n  background:linear-gradient(180deg,#FFFBEF,#FFF3D6);color:#3A2B00;\n  border-radius:22px;padding:34px 28px;border:6px double var(--gull-dyp);\n  box-shadow:0 18px 50px rgba(0,0,0,.55), 0 0 70px -20px rgba(255,200,61,.5);\n}\n.diplom::after{\n  content:\"🪙\";position:absolute;right:16px;bottom:12px;font-size:2.3rem;\n  filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));\n}\n.diplom h2{font-size:1.9rem;color:#8A6200;margin-bottom:4px}\n.diplom .gnavn{font-family:'Fredoka',sans-serif;font-size:1.6rem;font-weight:700;margin:12px 0 4px}\n.diplom p{font-size:1.05rem}\n.diplom .stat{margin-top:14px;font-weight:700;color:#8A6200}\n.diplom .monstre{font-size:2rem;margin-top:14px;letter-spacing:.2em}\n#tapt h2{color:var(--rod);font-size:2rem;margin-bottom:10px}\n#tapt p{color:var(--tekst-demp);max-width:520px;margin:0 auto 8px}\n\n\u002F* ===== Myntregn ===== *\u002F\n.mynt{\n  position:fixed;top:-50px;font-size:1.8rem;z-index:100;pointer-events:none;\n  animation:fall linear forwards;\n}\n@keyframes fall{\n  0%{transform:translateY(0) translateX(0) rotate(0)}\n  25%{transform:translateY(28vh) translateX(14px) rotate(180deg)}\n  50%{transform:translateY(55vh) translateX(-10px) rotate(360deg)}\n  75%{transform:translateY(83vh) translateX(12px) rotate(540deg)}\n  100%{transform:translateY(112vh) translateX(0) rotate(720deg)}\n}\n\n\u002F* ===== Pauseteppe ===== *\u002F\n#pauseteppe{\n  display:none;position:fixed;inset:0;z-index:200;\n  background:radial-gradient(circle at 50% 40%, rgba(38,42,82,.9), rgba(13,14,32,.97));\n  align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:20px;\n}\n#pauseteppe.vis{display:flex}\n#pauseteppe h2{color:var(--gull);font-size:2.2rem;text-shadow:0 0 26px rgba(255,200,61,.35)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"himmel\" aria-hidden=\"true\">\n  <span class=\"glod g1\"><\u002Fspan><span class=\"glod g2\"><\u002Fspan><span class=\"glod g3\"><\u002Fspan>\n  <span class=\"stjernedryss\"><\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:6%;--t:15s;--s:1.5rem;--o:.4;--dly:0s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:17%;--t:19s;--s:2.4rem;--o:.28;--dly:-7s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:32%;--t:13s;--s:1.1rem;--o:.34;--dly:-3s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:54%;--t:21s;--s:2rem;--o:.24;--dly:-11s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:69%;--t:16s;--s:1.3rem;--o:.36;--dly:-9s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:83%;--t:18s;--s:2.1rem;--o:.28;--dly:-2s\">🪙<\u002Fspan>\n  <span class=\"svevemynt\" style=\"--x:93%;--t:14s;--s:1.2rem;--o:.4;--dly:-5s\">🪙<\u002Fspan>\n<\u002Fdiv>\n\n<div id=\"topplinje\">\n  <div id=\"timer\">45:00<\u002Fdiv>\n  <div id=\"gruppevisning\"><\u002Fdiv>\n  <div class=\"toppknapper\">\n    <button class=\"toppknapp\" id=\"lydknapp\" type=\"button\" aria-label=\"Lyd av\u002Fpå\">🔊<\u002Fbutton>\n    <button class=\"toppknapp\" id=\"pauseknapp\" type=\"button\">⏸ Pause<\u002Fbutton>\n    <button class=\"toppknapp\" id=\"kartknapp\" type=\"button\">🗺️ Kart<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ START ============ -->\n<section class=\"skjerm aktiv\" id=\"start\">\n  <div class=\"hvelvhjul\" aria-hidden=\"true\">\n    <div class=\"hjul-ring\"><\u002Fdiv>\n    <div class=\"hjul-eiker\"><\u002Fdiv>\n    <div class=\"hjul-nav\">🔒<\u002Fdiv>\n  <\u002Fdiv>\n  <h1>Banken i Myntland er låst!<\u002Fh1>\n  <div class=\"monsterrad\" aria-hidden=\"true\">\n    <span class=\"m-chip\" style=\"--c:var(--bolge);--i:0\"><span class=\"m-fjes\">🌊<\u002Fspan>Bølge<\u002Fspan>\n    <span class=\"m-chip\" style=\"--c:var(--drage);--i:1\"><span class=\"m-fjes\">🔥<\u002Fspan>Drage<\u002Fspan>\n    <span class=\"m-chip\" style=\"--c:var(--maane);--i:2\"><span class=\"m-fjes\">🌙<\u002Fspan>Måne<\u002Fspan>\n    <span class=\"m-chip\" style=\"--c:var(--stjerne);--i:3\"><span class=\"m-fjes\">⭐<\u002Fspan>Stjerne<\u002Fspan>\n  <\u002Fdiv>\n  <img class=\"scenebilde\" id=\"bildeStart\" alt=\"Myntland-banken om natten, med Bølge, Drage, Måne og Stjerne foran den låste døra\" onerror=\"this.style.display='none'\">\n  <div class=\"intro\">\n    <p>Krise i Myntland! 😱 Noen har rotet det til i bankhvelvet, og alle myntene til klassens sparemål er sperret inne. Hvelvet åpnes bare med en hemmelig <strong>4-sifret kode<\u002Fstrong> — akkurat som PIN-koden på bankkortet ditt.<\u002Fp>\n    <p>Monstrene <strong>Bølge<\u002Fstrong> 🌊, <strong>Drage<\u002Fstrong> 🔥, <strong>Måne<\u002Fstrong> 🌙 og <strong>Stjerne<\u002Fstrong> ⭐ husker hvert sitt siffer — men bare hvis dere hjelper dem med en økonomigåte hver.<\u002Fp>\n    <p>Løs alle fire gåtene, finn koden og åpne hvelvet <strong>før banken stenger!<\u002Fstrong><\u002Fp>\n    <button class=\"lytt\" type=\"button\" onclick=\"lesOpp('intro', TEKST.intro)\">🔊 Hør historien<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"felt\">\n    <label for=\"gruppenavn\">Gruppenavn<\u002Flabel>\n    <input id=\"gruppenavn\" type=\"text\" maxlength=\"30\" placeholder=\"F.eks. Myntmesterne\" autocomplete=\"off\">\n  <\u002Fdiv>\n\n  <div class=\"felt\">\n    <label>Velg vanskelighetsgrad<\u002Flabel>\n    <div class=\"vanskelig-rad\" id=\"vanskeligRad\">\n      <button class=\"v-kort\" type=\"button\" data-niva=\"lett\">\n        <span class=\"emoji\">🟢<\u002Fspan>\n        <span class=\"navn\">Lett<\u002Fspan>\n        <span class=\"beskr\">Ett regnesteg om gangen<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"v-kort valgt\" type=\"button\" data-niva=\"middels\">\n        <span class=\"emoji\">🟡<\u002Fspan>\n        <span class=\"navn\">Middels<\u002Fspan>\n        <span class=\"beskr\">To steg — tenk dere om<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"v-kort\" type=\"button\" data-niva=\"utfordring\">\n        <span class=\"emoji\">🔴<\u002Fspan>\n        <span class=\"navn\">Utfordring<\u002Fspan>\n        <span class=\"beskr\">Flere steg og sammenligning<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"felt\">\n    <label>Tid før banken stenger<\u002Flabel>\n    <div class=\"tid-rad\" id=\"tidRad\">\n      <button class=\"tid-chip\" type=\"button\" data-min=\"30\">30 min<\u002Fbutton>\n      <button class=\"tid-chip valgt\" type=\"button\" data-min=\"45\">45 min<\u002Fbutton>\n      <button class=\"tid-chip\" type=\"button\" data-min=\"60\">60 min<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"storknapp\" id=\"startknapp\" type=\"button\">Start oppdraget 🪙<\u002Fbutton>\n<\u002Fsection>\n\n<!-- ============ KART ============ -->\n<section class=\"skjerm\" id=\"kart\" data-screen-label=\"Kart\">\n  <h2>Bankhvelvet<\u002Fh2>\n  <p class=\"undertekst\">Besøk de fire rommene og samle alle sifrene i koden.<\u002Fp>\n  <div class=\"plansje\">\n    <div class=\"maal\" aria-hidden=\"true\">24 M<\u002Fdiv>\n    <div class=\"kompass\" aria-hidden=\"true\">N<\u002Fdiv>\n    <div class=\"plan-grid\" id=\"romgrid\">\n      <div class=\"plan-hall\">\n        <span class=\"plan-nr\">HVELVET<\u002Fspan>\n        <div class=\"hvelvskive\" id=\"hvelvskive\" aria-hidden=\"true\">\n          <div class=\"skive-bolt\"><\u002Fdiv><div class=\"skive-bolt\"><\u002Fdiv>\n          <div class=\"skive-bolt\"><\u002Fdiv><div class=\"skive-bolt\"><\u002Fdiv>\n          <div class=\"skive-sentrum\">\n            <div class=\"laas\">🔒<\u002Fdiv>\n            <div class=\"siffer-rad\" id=\"sifferRad\">\n              <div class=\"siffer-boks tom\">?<\u002Fdiv>\n              <div class=\"siffer-boks tom\">?<\u002Fdiv>\n              <div class=\"siffer-boks tom\">?<\u002Fdiv>\n              <div class=\"siffer-boks tom\">?<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"inngang\" aria-hidden=\"true\">▲ INNGANG<\u002Fdiv>\n    <div class=\"tittelfelt\" aria-hidden=\"true\">\n      <span>Banken i Myntland<\u002Fspan><span>Plantegning · 1:100<\u002Fspan><span>Ark: Myntmesteren<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hvelvknapp-rad\">\n    <button class=\"storknapp\" id=\"tilHvelv\" type=\"button\" disabled=\"\">Åpne hvelvet 🔓<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ROM ============ -->\n<section class=\"skjerm\" id=\"rom\">\n  <button class=\"tilbake\" id=\"romTilbake\" type=\"button\">← Tilbake til kartet<\u002Fbutton>\n  <div class=\"rom-topp\">\n    <span class=\"monster\" id=\"romMonster\">🌊<\u002Fspan>\n    <h2 id=\"romTittel\">Rom<\u002Fh2>\n  <\u002Fdiv>\n  <img class=\"scenebilde\" id=\"romBilde\" alt=\"\" onerror=\"this.style.display='none'\">\n  <div class=\"fortelling\">\n    <span id=\"romFortelling\"><\u002Fspan>\n    <br><button class=\"lytt\" type=\"button\" id=\"romFortellingLytt\">🔊 Les høyt<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"oppgave\" id=\"romOppgaveBoks\">\n    <span class=\"merkelapp\" id=\"romMerkelapp\">Oppgave<\u002Fspan>\n    <div id=\"romOppgave\"><\u002Fdiv>\n    <button class=\"lytt\" type=\"button\" id=\"romOppgaveLytt\">🔊 Les oppgaven høyt<\u002Fbutton>\n    <div class=\"svar-rad\" style=\"margin-top:16px\">\n      <input id=\"romSvar\" type=\"text\" inputmode=\"numeric\" placeholder=\"Svar i mynter 🪙\" autocomplete=\"off\">\n      <button class=\"sjekk-knapp\" id=\"romSjekk\" type=\"button\">Sjekk svaret<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"melding\" id=\"romMelding\"><\u002Fdiv>\n    <button class=\"hint-knapp\" id=\"romHintKnapp\" type=\"button\">💡 Vis hint<\u002Fbutton>\n    <div class=\"hint-tekst\" id=\"romHintTekst\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HVELV ============ -->\n<section class=\"skjerm\" id=\"hvelv\">\n  <button class=\"tilbake\" id=\"hvelvTilbake\" type=\"button\">← Tilbake til kartet<\u002Fbutton>\n  <span id=\"hvelvIkon\">🔐<\u002Fspan>\n  <h2>Tast inn hvelvkoden<\u002Fh2>\n  <p class=\"undertekst\">Skriv de fire sifrene dere har funnet — i riktig rekkefølge (rom 1–4).<\u002Fp>\n  <img class=\"scenebilde liten\" id=\"bildeHvelv\" alt=\"Den store hvelvdøra i Myntland-banken\" onerror=\"this.style.display='none'\">\n  <div class=\"kode-rad\" id=\"kodeRad\">\n    <input class=\"kode-input\" type=\"text\" inputmode=\"numeric\" maxlength=\"1\" aria-label=\"Siffer 1\">\n    <input class=\"kode-input\" type=\"text\" inputmode=\"numeric\" maxlength=\"1\" aria-label=\"Siffer 2\">\n    <input class=\"kode-input\" type=\"text\" inputmode=\"numeric\" maxlength=\"1\" aria-label=\"Siffer 3\">\n    <input class=\"kode-input\" type=\"text\" inputmode=\"numeric\" maxlength=\"1\" aria-label=\"Siffer 4\">\n  <\u002Fdiv>\n  <button class=\"storknapp\" id=\"aapneHvelv\" type=\"button\">Vri om låsen 🔓<\u002Fbutton>\n  <div class=\"melding\" id=\"hvelvMelding\" style=\"max-width:480px;margin:18px auto 0\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ VUNNET ============ -->\n<section class=\"skjerm\" id=\"vunnet\">\n  <div class=\"hvelv-ikon\">🏦✨<\u002Fdiv>\n  <img class=\"scenebilde\" id=\"bildeVunnet\" alt=\"Hvelvet står åpent og myntene strømmer ut mens monstrene jubler\" onerror=\"this.style.display='none'\">\n  <div class=\"diplom\">\n    <h2>🏆 Hvelvet er åpnet!<\u002Fh2>\n    <p>Diplom tildeles<\u002Fp>\n    <div class=\"gnavn\" id=\"diplomNavn\">Gruppen<\u002Fdiv>\n    <p>som reddet myntene til klassens sparemål og viste at de kan rente, skatt, fond og budsjett!<\u002Fp>\n    <div class=\"stat\" id=\"diplomStat\"><\u002Fdiv>\n    <div class=\"monstre\">🌊 🔥 🌙 ⭐<\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"storknapp\" id=\"spillIgjen\" type=\"button\" style=\"margin-top:30px\">Spill igjen 🔄<\u002Fbutton>\n<\u002Fsection>\n\n<!-- ============ TAPT ============ -->\n<section class=\"skjerm\" id=\"tapt\">\n  <div class=\"hvelv-ikon\">🏦💤<\u002Fdiv>\n  <img class=\"scenebilde\" id=\"bildeTapt\" alt=\"Banken er mørk og stengt for natten\" onerror=\"this.style.display='none'\">\n  <h2>Banken stengte!<\u002Fh2>\n  <p>Tiden gikk ut før hvelvet ble åpnet. Men monstrene så hvor hardt dere jobbet — og banken åpner igjen i morgen tidlig.<\u002Fp>\n  <p><strong>Snakk sammen:<\u002Fstrong> Hvilken gåte var vanskeligst? Hva ville dere gjort annerledes?<\u002Fp>\n  <button class=\"storknapp\" id=\"provIgjen\" type=\"button\" style=\"margin-top:26px\">Prøv igjen 🔄<\u002Fbutton>\n<\u002Fsection>\n\n<!-- ============ DØR-OVERGANG ============ -->\n<div id=\"dorteppe\" aria-hidden=\"true\">\n  <div class=\"dorblad\">\n    <div class=\"dorforside\">\n      <div class=\"skilt\" id=\"dorSkilt\">Rom 1<\u002Fdiv>\n      <div class=\"handtak\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"pauseteppe\">\n  <h2>⏸ Pause<\u002Fh2>\n  <p style=\"color:var(--tekst-demp)\">Klokka står stille. Trekk pusten, monstrene venter.<\u002Fp>\n  <button class=\"storknapp\" id=\"fortsett\" type=\"button\">Fortsett ▶<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n\"use strict\";\n\n\u002F* ================= MEDIEMAPPER =================\n   Legg bildene i  banken-i-myntland\u002Fbilder\u002F  og lyden i  banken-i-myntland\u002Flyd\u002F\n   ved siden av denne HTML-fila. Mangler en fil, gjemmes bildet \u002F brukes\n   nettleserens norske talesyntese i stedet — spillet virker uansett. *\u002F\nconst MAPPE = \"banken-i-myntland\";\nconst BILDER = {\n  start:   MAPPE + \"\u002Fbilder\u002Fstart.png\",\n  bolge:   MAPPE + \"\u002Fbilder\u002From-bolge.png\",\n  drage:   MAPPE + \"\u002Fbilder\u002From-drage.png\",\n  maane:   MAPPE + \"\u002Fbilder\u002From-maane.png\",\n  stjerne: MAPPE + \"\u002Fbilder\u002From-stjerne.png\",\n  hvelv:   MAPPE + \"\u002Fbilder\u002Fhvelv.png\",\n  vunnet:  MAPPE + \"\u002Fbilder\u002Fvunnet.png\",\n  tapt:    MAPPE + \"\u002Fbilder\u002Ftapt.png\"\n};\nconst LYD_BASE = MAPPE + \"\u002Flyd\u002F\";\n\n\u002F* ================= OPPGAVEDATA =================\n   Regel: sifferet til hvelvet = SISTE siffer i svaret. *\u002F\nconst ROM = [\n  {\n    id:\"bolge\", monster:\"🌊\", navn:\"Bølges sparekammer\", farge:\"var(--bolge)\",\n    fortelling:\"Bølge sitter på en haug med sparegriser og klør seg i pelsen. «Jeg husker sifferet mitt … men bare hvis noen hjelper meg å regne renter!»\",\n    oppgaver:{\n      lett:{\n        tekst:`Bølge har <strong>100 🪙<\u002Fstrong> på sparekontoen. Sparekontoen gir <strong>2 % rente i uka<\u002Fstrong>.<br><br>Hvor mange mynter får Bølge i rente etter <strong>én uke<\u002Fstrong>?`,\n        tale:\"Bølge har hundre mynter på sparekontoen. Sparekontoen gir to prosent rente i uka. Hvor mange mynter får Bølge i rente etter én uke?\",\n        svar:2,\n        hint:\"2 % betyr 2 mynter for hver 100 mynter på kontoen.\"\n      },\n      middels:{\n        tekst:`Bølge flytter <strong>400 🪙<\u002Fstrong> til superspar-kontoen i banken. Den gir <strong>5 % rente i uka<\u002Fstrong>, og renten settes inn på kontoen — så neste uke regnes renten av den nye saldoen.<br><br>Hvor mange mynter står på kontoen etter <strong>2 uker<\u002Fstrong>?`,\n        tale:\"Bølge flytter fire hundre mynter til superspar-kontoen i banken. Den gir fem prosent rente i uka, og renten settes inn på kontoen, så neste uke regnes renten av den nye saldoen. Hvor mange mynter står på kontoen etter to uker?\",\n        svar:441,\n        hint:\"Uke 1: 5 % av 400 = 20 mynter. Ny saldo: 420. Uke 2: regn 5 % av 420 — og legg sammen.\"\n      },\n      utfordring:{\n        tekst:`Måne har <strong>2500 🪙<\u002Fstrong> og må velge:<br><br>\n        <table class=\"fakta-tabell\">\n        <tr><td>🅰️ Sette alt på sparekonto med 2 % rente i uka, i 2 uker — renten settes inn på kontoen, så uke 2 regnes renten av ny saldo<\u002Ftd><td>?<\u002Ftd><\u002Ftr>\n        <tr><td>🅱️ Ta imot en engangsbonus med en gang<\u002Ftd><td>100 🪙<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        Hvor mange mynter <strong>mer<\u002Fstrong> gir det beste valget enn det dårligste?`,\n        tale:\"Måne har to tusen fem hundre mynter og må velge. Alternativ A: sette alt på sparekonto med to prosent rente i uka, i to uker. Renten settes inn på kontoen, så uke to regnes renten av den nye saldoen. Alternativ B: ta imot en engangsbonus på hundre mynter med en gang. Hvor mange mynter mer gir det beste valget enn det dårligste?\",\n        svar:1,\n        hint:\"Uke 1: 2 % av 2500 = 50 mynter. Ny saldo: 2550. Uke 2: 2 % av 2550 = 51. Sammenlign renten til sammen med 100 🪙.\"\n      }\n    }\n  },\n  {\n    id:\"drage\", monster:\"🔥\", navn:\"Drages fondskjeller\", farge:\"var(--drage)\",\n    fortelling:\"Nede i kjelleren stirrer Drage på en skjerm full av fondskurser, med flammende rød pels på høykant. «Kursene hopper opp og ned! Hjelp meg å regne, så husker jeg sifferet mitt.»\",\n    oppgaver:{\n      lett:{\n        tekst:`Drage kjøpte én andel i fondet <strong>Trygg Skog<\u002Fstrong> på mandag.<br><br>\n        <table class=\"fakta-tabell\">\n        <tr><td>Kurs mandag<\u002Ftd><td>10 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>Kurs fredag<\u002Ftd><td>14 🪙<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        Hvor mange mynter <strong>steg<\u002Fstrong> kursen fra mandag til fredag?`,\n        tale:\"Drage kjøpte én andel i fondet Trygg Skog på mandag. Kursen var ti mynter på mandag, og fjorten mynter på fredag. Hvor mange mynter steg kursen fra mandag til fredag?\",\n        svar:4,\n        hint:\"Hvor mye mer koster andelen på fredag enn på mandag?\"\n      },\n      middels:{\n        tekst:`Drage kjøpte <strong>5 andeler<\u002Fstrong> i fondet <strong>Vill Vulkan<\u002Fstrong> (høy risiko!) da kursen var <strong>12 🪙<\u002Fstrong>. Senere solgte Drage alle andelene da kursen var <strong>18 🪙<\u002Fstrong>.<br><br>Hvor stor ble <strong>gevinsten<\u002Fstrong> (før skatt)?`,\n        tale:\"Drage kjøpte fem andeler i fondet Vill Vulkan, da kursen var tolv mynter. Senere solgte Drage alle andelene da kursen var atten mynter. Hvor stor ble gevinsten, før skatt?\",\n        svar:30,\n        hint:\"Finn først hvor mye kursen steg per andel. Gang så med 5 andeler.\"\n      },\n      utfordring:{\n        tekst:`Drage kjøpte <strong>10 andeler<\u002Fstrong> i fondet <strong>Vill Vulkan<\u002Fstrong> da kursen var <strong>15 🪙<\u002Fstrong>, og solgte alle da kursen var <strong>19 🪙<\u002Fstrong>.<br><br>I Myntland betaler man <strong>10 % skatt av gevinsten<\u002Fstrong> ved uttak fra fond.<br><br>Hvor mange mynter sitter Drage igjen med i gevinst <strong>etter skatt<\u002Fstrong>?`,\n        tale:\"Drage kjøpte ti andeler i fondet Vill Vulkan da kursen var femten mynter, og solgte alle da kursen var nitten mynter. I Myntland betaler man ti prosent skatt av gevinsten ved uttak fra fond. Hvor mange mynter sitter Drage igjen med i gevinst etter skatt?\",\n        svar:36,\n        hint:\"Steg 1: gevinst = (19 − 15) × 10. Steg 2: trekk fra 10 % av gevinsten i skatt.\"\n      }\n    }\n  },\n  {\n    id:\"maane\", monster:\"🌙\", navn:\"Månes skattekontor\", farge:\"var(--maane)\",\n    fortelling:\"Måne sitter bak en diger bunke kvitteringer på skattekontoret. «Lønn inn, skatt ut, regninger ut … hjelp meg å få regnskapet til å stemme, så får dere sifferet mitt!»\",\n    oppgaver:{\n      lett:{\n        tekst:`Stjerne har jobben som <strong>bibliotekar<\u002Fstrong> og får <strong>50 🪙<\u002Fstrong> i lønn på fredag. Av lønna trekkes <strong>20 % skatt<\u002Fstrong>, som går til klassens sparemål.<br><br>Hvor mange mynter betaler Stjerne i <strong>skatt<\u002Fstrong>?`,\n        tale:\"Stjerne har jobben som bibliotekar, og får femti mynter i lønn på fredag. Av lønna trekkes tjue prosent skatt, som går til klassens sparemål. Hvor mange mynter betaler Stjerne i skatt?\",\n        svar:10,\n        hint:\"20 % er det samme som en femtedel. Hva er en femtedel av 50?\"\n      },\n      middels:{\n        tekst:`Bølge har jobben som <strong>IT-ansvarlig<\u002Fstrong> og får <strong>80 🪙<\u002Fstrong> i lønn på fredag. Av lønna trekkes <strong>20 % skatt<\u002Fstrong>.<br><br>Hvor mange mynter har Bølge <strong>igjen etter skatt<\u002Fstrong>?`,\n        tale:\"Bølge har jobben som IT-ansvarlig, og får åtti mynter i lønn på fredag. Av lønna trekkes tjue prosent skatt. Hvor mange mynter har Bølge igjen etter skatt?\",\n        svar:64,\n        hint:\"Regn først ut skatten (20 % av 80). Trekk den så fra lønna.\"\n      },\n      utfordring:{\n        tekst:`Stjerne får <strong>120 🪙<\u002Fstrong> i lønn på fredag. Først trekkes <strong>20 % skatt<\u002Fstrong>. Deretter trekkes de faste fredagsutgiftene:<br><br>\n        <table class=\"fakta-tabell\">\n        <tr><td>Leie av pult<\u002Ftd><td>15 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>Strøm<\u002Ftd><td>8 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>Leie av iPad<\u002Ftd><td>13 🪙<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        Hvor mange mynter har Stjerne <strong>igjen<\u002Fstrong> når alt er betalt?`,\n        tale:\"Stjerne får hundre og tjue mynter i lønn på fredag. Først trekkes tjue prosent skatt. Deretter trekkes de faste fredagsutgiftene: femten mynter for leie av pult, åtte mynter for strøm, og tretten mynter for leie av iPad. Hvor mange mynter har Stjerne igjen når alt er betalt?\",\n        svar:60,\n        hint:\"Steg 1: 120 minus 20 % skatt. Steg 2: trekk fra alle de tre utgiftene.\"\n      }\n    }\n  },\n  {\n    id:\"stjerne\", monster:\"⭐\", navn:\"Stjernes butikk\", farge:\"var(--stjerne)\",\n    fortelling:\"Stjerne står bak disken i klassebutikken og jonglerer med prislapper. «Kundene står i kø! Hjelp meg med budsjettet, så hvisker jeg det siste sifferet til dere.»\",\n    oppgaver:{\n      lett:{\n        tekst:`Drage skal handle i butikken:<br><br>\n        <table class=\"fakta-tabell\">\n        <tr><td>📓 Skrivebok<\u002Ftd><td>12 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>✏️ Blyant<\u002Ftd><td>5 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>🧽 Viskelær<\u002Ftd><td>3 🪙<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        Hvor mange mynter koster <strong>alt til sammen<\u002Fstrong>?`,\n        tale:\"Drage skal handle i butikken. En skrivebok koster tolv mynter, en blyant koster fem mynter, og et viskelær koster tre mynter. Hvor mange mynter koster alt til sammen?\",\n        svar:20,\n        hint:\"Legg sammen de tre prisene: 12 + 5 + 3.\"\n      },\n      middels:{\n        tekst:`Måne har <strong>50 🪙<\u002Fstrong> på brukskontoen og handler:<br><br>\n        <table class=\"fakta-tabell\">\n        <tr><td>🎧 Låne hodetelefoner en uke<\u002Ftd><td>12 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>🪑 Velge plass i klasserommet<\u002Ftd><td>18 🪙<\u002Ftd><\u002Ftr>\n        <tr><td>📓 Ny skrivebok<\u002Ftd><td>15 🪙<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        Hvor mange mynter har Måne <strong>igjen<\u002Fstrong> etter handelen?`,\n        tale:\"Måne har femti mynter på brukskontoen og handler tre ting: låne hodetelefoner en uke for tolv mynter, velge plass i klasserommet for atten mynter, og en ny skrivebok for femten mynter. Hvor mange mynter har Måne igjen etter handelen?\",\n        svar:5,\n        hint:\"Regn først ut hva alt koster til sammen. Trekk det så fra 50.\"\n      },\n      utfordring:{\n        tekst:`Stjerne tjener <strong>150 🪙 i uka<\u002Fstrong> og følger <strong>50-30-20-regelen<\u002Fstrong>: 50 % til ting man <em>trenger<\u002Fem>, 30 % til ting man har <em>lyst på<\u002Fem>, og 20 % til <em>sparing<\u002Fem>.<br><br>Hvor mange mynter setter Stjerne av til <strong>sparing<\u002Fstrong> hver uke?`,\n        tale:\"Stjerne tjener hundre og femti mynter i uka, og følger femti tretti tjue-regelen: femti prosent til ting man trenger, tretti prosent til ting man har lyst på, og tjue prosent til sparing. Hvor mange mynter setter Stjerne av til sparing hver uke?\",\n        svar:30,\n        hint:\"Sparing er 20 % av 150. Tips: 10 % av 150 er 15.\"\n      }\n    }\n  }\n];\n\nconst TEKST = {\n  intro:\"Krise i Myntland! Noen har rotet det til i bankhvelvet, og alle myntene til klassens sparemål er sperret inne. Hvelvet åpnes bare med en hemmelig kode på fire siffer — akkurat som PIN-koden på bankkortet ditt. Monstrene Bølge, Drage, Måne og Stjerne husker hvert sitt siffer — men bare hvis dere hjelper dem med en økonomigåte hver. Løs alle fire gåtene, finn koden, og åpne hvelvet før banken stenger!\",\n  hvelv:\"Tast inn hvelvkoden! Skriv de fire sifrene dere har funnet — i riktig rekkefølge, fra rom én til rom fire.\",\n  vunnet:\"Hvelvet er åpnet! Myntene strømmer ut, og klassens sparemål er reddet. Monstrene jubler — dere er ekte myntmestere!\",\n  tapt:\"Bom! Banken stengte, og hvelvet forble låst. Men monstrene så hvor hardt dere jobbet — og banken åpner igjen i morgen tidlig.\"\n};\n\n\u002F* ================= TILSTAND ================= *\u002F\nlet niva = \"middels\";\nlet totalSek = 45 * 60;\nlet restSek = totalSek;\nlet timerId = null;\nlet pause = false;\nlet funnet = [null, null, null, null];\nlet forsoek = [0, 0, 0, 0];\nlet aktivtRom = 0;\nlet spillSlutt = false;\nlet lydPaa = true;\n\nconst $ = id => document.getElementById(id);\nconst skjermer = [\"start\",\"kart\",\"rom\",\"hvelv\",\"vunnet\",\"tapt\"];\nconst redusertBevegelse = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\nfunction visSkjerm(navn){\n  skjermer.forEach(s => $(s).classList.toggle(\"aktiv\", s === navn));\n  window.scrollTo({top:0});\n}\nfunction kode(){ return ROM.map(r => String(r.oppgaver[niva].svar % 10)).join(\"\"); }\n\n\u002F* ================= OPPLEST TEKST (mp3 → talesyntese-fallback) ================= *\u002F\nlet aktivLyd = null;\nfunction stoppOpplesing(){\n  if(aktivLyd){ aktivLyd.pause(); aktivLyd = null; }\n  if(\"speechSynthesis\" in window) speechSynthesis.cancel();\n}\nfunction lesOpp(filnavn, tekst){\n  if(!lydPaa) return;\n  stoppOpplesing();\n  const audio = new Audio(LYD_BASE + filnavn + \".mp3\");\n  aktivLyd = audio;\n  let startet = false;\n  audio.addEventListener(\"canplaythrough\", ()=>{ startet = true; audio.play().catch(()=>talesyntese(tekst)); }, {once:true});\n  audio.addEventListener(\"error\", ()=>{ if(!startet) talesyntese(tekst); });\n  audio.load();\n  setTimeout(()=>{ if(!startet && audio.readyState < 3){ aktivLyd = null; talesyntese(tekst); } }, 2500);\n}\nfunction talesyntese(tekst){\n  if(!lydPaa || !(\"speechSynthesis\" in window)) return;\n  speechSynthesis.cancel();\n  const y = new SpeechSynthesisUtterance(tekst.replace(\u002F🪙\u002Fg,\" mynter \"));\n  y.lang = \"nb-NO\";\n  y.rate = 0.95;\n  const stemme = speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith(\"nb\"))\n              || speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith(\"no\"));\n  if(stemme) y.voice = stemme;\n  speechSynthesis.speak(y);\n}\nif(\"speechSynthesis\" in window) speechSynthesis.getVoices(); \u002F\u002F varm opp stemmelista\n\n\u002F* ================= LYDEFFEKTER (WebAudio — ingen filer trengs) ================= *\u002F\nlet ac = null;\nfunction ctx(){\n  if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();\n  if(ac.state === \"suspended\") ac.resume();\n  return ac;\n}\nfunction sfxKnirk(){ \u002F\u002F knirkende dør 🚪\n  if(!lydPaa) return;\n  try{\n    const a = ctx(), t = a.currentTime;\n    const osc = a.createOscillator(), lfo = a.createOscillator(), lfoG = a.createGain();\n    const filt = a.createBiquadFilter(), g = a.createGain();\n    osc.type = \"sawtooth\";\n    osc.frequency.setValueAtTime(95, t);\n    osc.frequency.linearRampToValueAtTime(62, t + 1.0);\n    lfo.frequency.value = 7; lfoG.gain.value = 22;\n    lfo.connect(lfoG); lfoG.connect(osc.frequency);\n    filt.type = \"bandpass\"; filt.frequency.value = 320; filt.Q.value = 6;\n    g.gain.setValueAtTime(0.0001, t);\n    g.gain.exponentialRampToValueAtTime(0.16, t + 0.12);\n    g.gain.setValueAtTime(0.16, t + 0.7);\n    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.05);\n    osc.connect(filt); filt.connect(g); g.connect(a.destination);\n    osc.start(t); lfo.start(t); osc.stop(t + 1.1); lfo.stop(t + 1.1);\n  }catch(e){}\n}\nfunction sfxMynt(){ \u002F\u002F mynteklirr ved riktig svar\n  if(!lydPaa) return;\n  try{\n    const a = ctx(), t = a.currentTime;\n    [[1568,0],[2093,0.09],[2637,0.18]].forEach(([f,d])=>{\n      const o = a.createOscillator(), g = a.createGain();\n      o.type = \"sine\"; o.frequency.value = f;\n      g.gain.setValueAtTime(0.12, t + d);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + d + 0.35);\n      o.connect(g); g.connect(a.destination);\n      o.start(t + d); o.stop(t + d + 0.4);\n    });\n  }catch(e){}\n}\nfunction sfxFeil(){ \u002F\u002F dunkende \"ikke riktig\"\n  if(!lydPaa) return;\n  try{\n    const a = ctx(), t = a.currentTime;\n    const o = a.createOscillator(), g = a.createGain(), f = a.createBiquadFilter();\n    o.type = \"square\"; o.frequency.setValueAtTime(140, t);\n    o.frequency.linearRampToValueAtTime(95, t + 0.22);\n    f.type = \"lowpass\"; f.frequency.value = 500;\n    g.gain.setValueAtTime(0.1, t);\n    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);\n    o.connect(f); f.connect(g); g.connect(a.destination);\n    o.start(t); o.stop(t + 0.3);\n  }catch(e){}\n}\nfunction sfxHvelv(){ \u002F\u002F metallisk sveiv + tungt dunk når hvelvet åpnes\n  if(!lydPaa) return;\n  try{\n    const a = ctx(), t = a.currentTime;\n    for(let i = 0; i < 9; i++){ \u002F\u002F skrallelyd\n      const o = a.createOscillator(), g = a.createGain();\n      o.type = \"square\"; o.frequency.value = 900 + Math.random()*500;\n      const start = t + i * 0.09;\n      g.gain.setValueAtTime(0.05, start);\n      g.gain.exponentialRampToValueAtTime(0.0001, start + 0.05);\n      o.connect(g); g.connect(a.destination);\n      o.start(start); o.stop(start + 0.06);\n    }\n    const dunk = a.createOscillator(), dg = a.createGain(); \u002F\u002F tungt dunk\n    dunk.type = \"sine\"; dunk.frequency.setValueAtTime(70, t + 0.95);\n    dunk.frequency.exponentialRampToValueAtTime(38, t + 1.4);\n    dg.gain.setValueAtTime(0.35, t + 0.95);\n    dg.gain.exponentialRampToValueAtTime(0.0001, t + 1.5);\n    dunk.connect(dg); dg.connect(a.destination);\n    dunk.start(t + 0.95); dunk.stop(t + 1.55);\n  }catch(e){}\n}\nfunction sfxTikk(){ \u002F\u002F klokketikk siste 10 sekunder\n  if(!lydPaa) return;\n  try{\n    const a = ctx(), t = a.currentTime;\n    const o = a.createOscillator(), g = a.createGain();\n    o.type = \"sine\"; o.frequency.value = 1100;\n    g.gain.setValueAtTime(0.07, t);\n    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);\n    o.connect(g); g.connect(a.destination);\n    o.start(t); o.stop(t + 0.07);\n  }catch(e){}\n}\n\n$(\"lydknapp\").addEventListener(\"click\", ()=>{\n  lydPaa = !lydPaa;\n  $(\"lydknapp\").textContent = lydPaa ? \"🔊\" : \"🔇\";\n  if(!lydPaa) stoppOpplesing();\n});\n\n\u002F* ================= START ================= *\u002F\n\u002F* Valgfrie bilder: prøv å laste i bakgrunnen, vis bare hvis fila finnes.\n   (Unngår resource-feil i konsollen når mappa ikke er der.) *\u002F\nfunction lastValgfrittBilde(img, url){\n  img.style.display = \"none\";\n  const p = new Image();\n  p.onload = ()=>{ img.src = url; img.style.display = \"\"; };\n  p.src = url;\n}\nlastValgfrittBilde($(\"bildeStart\"), BILDER.start);\nlastValgfrittBilde($(\"bildeHvelv\"), BILDER.hvelv);\nlastValgfrittBilde($(\"bildeVunnet\"), BILDER.vunnet);\nlastValgfrittBilde($(\"bildeTapt\"), BILDER.tapt);\n\n$(\"vanskeligRad\").addEventListener(\"click\", e=>{\n  const kort = e.target.closest(\".v-kort\");\n  if(!kort) return;\n  document.querySelectorAll(\".v-kort\").forEach(k=>k.classList.remove(\"valgt\"));\n  kort.classList.add(\"valgt\");\n  niva = kort.dataset.niva;\n});\n$(\"tidRad\").addEventListener(\"click\", e=>{\n  const chip = e.target.closest(\".tid-chip\");\n  if(!chip) return;\n  document.querySelectorAll(\".tid-chip\").forEach(c=>c.classList.remove(\"valgt\"));\n  chip.classList.add(\"valgt\");\n  totalSek = Number(chip.dataset.min) * 60;\n});\n$(\"startknapp\").addEventListener(\"click\", ()=>{\n  restSek = totalSek;\n  funnet = [null,null,null,null];\n  forsoek = [0,0,0,0];\n  spillSlutt = false;\n  stoppOpplesing();\n  const navn = $(\"gruppenavn\").value.trim() || \"Hemmelig gruppe\";\n  $(\"gruppevisning\").textContent = navn + \" · \" + nivaNavn();\n  $(\"topplinje\").classList.add(\"vis\");\n  byggKart();\n  oppdaterSiffer();\n  visSkjerm(\"kart\");\n  startTimer();\n});\nfunction nivaNavn(){\n  return niva===\"lett\" ? \"🟢 Lett\" : niva===\"middels\" ? \"🟡 Middels\" : \"🔴 Utfordring\";\n}\n\n\u002F* ================= TIMER ================= *\u002F\nfunction startTimer(){\n  clearInterval(timerId);\n  visTid();\n  timerId = setInterval(()=>{\n    if(pause || spillSlutt) return;\n    restSek--;\n    visTid();\n    if(restSek <= 10 && restSek > 0) sfxTikk();\n    if(restSek <= 0){\n      spillSlutt = true;\n      clearInterval(timerId);\n      stoppOpplesing();\n      $(\"topplinje\").classList.remove(\"vis\");\n      visSkjerm(\"tapt\");\n      lesOpp(\"tapt\", TEKST.tapt);\n    }\n  }, 1000);\n}\nfunction visTid(){\n  const m = Math.floor(Math.max(restSek,0)\u002F60);\n  const s = Math.max(restSek,0)%60;\n  const t = $(\"timer\");\n  t.textContent = String(m).padStart(2,\"0\")+\":\"+String(s).padStart(2,\"0\");\n  t.classList.toggle(\"haster\", restSek <= 300);\n}\n$(\"pauseknapp\").addEventListener(\"click\", ()=>{ pause = true; stoppOpplesing(); $(\"pauseteppe\").classList.add(\"vis\"); });\n$(\"fortsett\").addEventListener(\"click\", ()=>{ pause = false; $(\"pauseteppe\").classList.remove(\"vis\"); });\n$(\"kartknapp\").addEventListener(\"click\", ()=>{ if(!spillSlutt){ stoppOpplesing(); visSkjerm(\"kart\"); } });\n\n\u002F* ================= KART ================= *\u002F\nfunction byggKart(){\n  const grid = $(\"romgrid\");\n  grid.querySelectorAll(\".plan-rom\").forEach(el => el.remove());\n  ROM.forEach((r,i)=>{\n    const b = document.createElement(\"button\");\n    b.type = \"button\";\n    b.className = \"plan-rom\" + (funnet[i]!==null ? \" lost\" : \"\");\n    b.style.setProperty(\"--farge\", r.farge);\n    b.style.gridArea = \"r\"+(i+1);\n    b.innerHTML = `<span class=\"plan-nr\">ROM 0${i+1}<\u002Fspan>\n      <span class=\"dor ${i<2 ? \"ned\" : \"opp\"}\" aria-hidden=\"true\"><\u002Fspan>\n      <span class=\"monster\">${r.monster}<\u002Fspan>\n      <span class=\"plan-navn\">${r.navn}<\u002Fspan>\n      <span class=\"plan-status\">${funnet[i]!==null ? \"✓ Siffer funnet: \"+funnet[i] : \"Gåten venter …\"}<\u002Fspan>`;\n    b.addEventListener(\"click\", ()=> gaaTilRom(i));\n    grid.appendChild(b);\n  });\n  $(\"tilHvelv\").disabled = funnet.some(f => f===null);\n}\nfunction oppdaterSiffer(nyttIndex){\n  const bokser = $(\"sifferRad\").children;\n  for(let i=0;i<4;i++){\n    bokser[i].textContent = funnet[i]!==null ? funnet[i] : \"?\";\n    bokser[i].classList.toggle(\"tom\", funnet[i]===null);\n    bokser[i].classList.remove(\"ny\");\n    if(i === nyttIndex){ void bokser[i].offsetWidth; bokser[i].classList.add(\"ny\"); }\n  }\n}\n$(\"tilHvelv\").addEventListener(\"click\", ()=>{\n  $(\"hvelvMelding\").className = \"melding\";\n  document.querySelectorAll(\".kode-input\").forEach(inp=>{ inp.value=\"\"; inp.classList.remove(\"gronn\"); });\n  visSkjerm(\"hvelv\");\n  lesOpp(\"hvelv\", TEKST.hvelv);\n  document.querySelector(\".kode-input\").focus();\n});\n\n\u002F* ================= DØR-OVERGANG ================= *\u002F\nfunction gaaTilRom(i){\n  stoppOpplesing();\n  sfxKnirk();\n  if(redusertBevegelse){\n    aapneRom(i);\n    return;\n  }\n  $(\"dorSkilt\").textContent = \"Rom \" + (i+1) + \": \" + ROM[i].navn;\n  const teppe = $(\"dorteppe\");\n  teppe.classList.add(\"vis\");\n  teppe.classList.remove(\"aapner\");\n  void teppe.offsetWidth;\n  aapneRom(i, true);\n  teppe.classList.add(\"aapner\");\n  setTimeout(()=>{ teppe.classList.remove(\"vis\",\"aapner\"); }, 2450);\n}\n\n\u002F* ================= ROM ================= *\u002F\nfunction aapneRom(i, stille){\n  aktivtRom = i;\n  const r = ROM[i];\n  const o = r.oppgaver[niva];\n  $(\"romMonster\").textContent = r.monster;\n  $(\"romTittel\").textContent = \"Rom \"+(i+1)+\": \"+r.navn;\n  $(\"romTittel\").style.color = r.farge;\n  const bilde = $(\"romBilde\");\n  bilde.alt = r.navn;\n  lastValgfrittBilde(bilde, BILDER[r.id]);\n  $(\"romFortelling\").textContent = r.fortelling;\n  $(\"romOppgaveBoks\").style.setProperty(\"--farge\", r.farge);\n  $(\"romMerkelapp\").textContent = \"Oppgave · \" + nivaNavn();\n  $(\"romOppgave\").innerHTML = o.tekst;\n  $(\"romHintTekst\").textContent = \"💡 \" + o.hint;\n  $(\"romHintTekst\").classList.remove(\"vis\");\n  $(\"romHintKnapp\").classList.toggle(\"vis\", forsoek[i] >= 2 && funnet[i]===null);\n  $(\"romMelding\").className = \"melding\";\n  $(\"romSvar\").value = \"\";\n  $(\"romSvar\").disabled = funnet[i]!==null;\n  $(\"romSjekk\").disabled = funnet[i]!==null;\n  if(funnet[i]!==null){\n    const m = $(\"romMelding\");\n    m.className = \"melding riktig\";\n    m.innerHTML = \"✓ Allerede løst! Sifferet er <strong>\"+funnet[i]+\"<\u002Fstrong>.\";\n  }\n  $(\"romFortellingLytt\").onclick = ()=> lesOpp(\"fortelling-\"+r.id, r.fortelling);\n  $(\"romOppgaveLytt\").onclick = ()=> lesOpp(\"oppgave-\"+r.id+\"-\"+niva, o.tale);\n  visSkjerm(\"rom\");\n  if(funnet[i]===null){\n    \u002F\u002F les fortellingen høyt automatisk (etter dørknirket)\n    setTimeout(()=> lesOpp(\"fortelling-\"+r.id, r.fortelling), redusertBevegelse ? 200 : 1100);\n    $(\"romSvar\").focus();\n  }\n}\n$(\"romTilbake\").addEventListener(\"click\", ()=>{ stoppOpplesing(); visSkjerm(\"kart\"); });\n$(\"romHintKnapp\").addEventListener(\"click\", ()=> $(\"romHintTekst\").classList.add(\"vis\"));\n$(\"romSvar\").addEventListener(\"keydown\", e=>{ if(e.key===\"Enter\") sjekkSvar(); });\n$(\"romSjekk\").addEventListener(\"click\", sjekkSvar);\n\nfunction sjekkSvar(){\n  const i = aktivtRom;\n  if(funnet[i]!==null || spillSlutt) return;\n  const raatt = $(\"romSvar\").value.replace(\u002F\\s\u002Fg,\"\").replace(\",\",\".\");\n  const tall = Number(raatt);\n  const m = $(\"romMelding\");\n  if(raatt === \"\" || Number.isNaN(tall)){\n    m.className = \"melding feil\";\n    m.textContent = \"Skriv svaret som et tall i mynter 🪙\";\n    return;\n  }\n  const o = ROM[i].oppgaver[niva];\n  if(tall === o.svar){\n    const siffer = o.svar % 10;\n    funnet[i] = siffer;\n    m.className = \"melding riktig\";\n    m.innerHTML = `🎉 Riktig! Svaret er <strong>${o.svar} 🪙<\u002Fstrong>.<br>\n      ${ROM[i].monster} hvisker: «Sifferet mitt er det <strong>siste sifferet i svaret<\u002Fstrong> — altså <strong>${siffer}<\u002Fstrong>!»`;\n    $(\"romSvar\").disabled = true;\n    $(\"romSjekk\").disabled = true;\n    $(\"romHintKnapp\").classList.remove(\"vis\");\n    sfxMynt();\n    oppdaterSiffer(i);\n    byggKart();\n    myntregn(14);\n  } else {\n    forsoek[i]++;\n    sfxFeil();\n    m.className = \"melding feil\";\n    m.textContent = forsoek[i] === 1\n      ? \"Ikke helt — les oppgaven en gang til og prøv på nytt!\"\n      : \"Fortsatt ikke riktig. Snakk sammen i gruppa — eller bruk hintet! 💡\";\n    if(forsoek[i] >= 2) $(\"romHintKnapp\").classList.add(\"vis\");\n    $(\"romOppgaveBoks\").classList.remove(\"skjelv\");\n    void $(\"romOppgaveBoks\").offsetWidth;\n    $(\"romOppgaveBoks\").classList.add(\"skjelv\");\n  }\n}\n\n\u002F* ================= HVELV ================= *\u002F\n$(\"hvelvTilbake\").addEventListener(\"click\", ()=>{ stoppOpplesing(); visSkjerm(\"kart\"); });\ndocument.querySelectorAll(\".kode-input\").forEach((inp, idx, alle)=>{\n  inp.addEventListener(\"input\", ()=>{\n    inp.value = inp.value.replace(\u002F\\D\u002Fg,\"\").slice(0,1);\n    if(inp.value && idx < alle.length-1) alle[idx+1].focus();\n  });\n  inp.addEventListener(\"keydown\", e=>{\n    if(e.key===\"Backspace\" && !inp.value && idx>0) alle[idx-1].focus();\n    if(e.key===\"Enter\") $(\"aapneHvelv\").click();\n  });\n});\n$(\"aapneHvelv\").addEventListener(\"click\", ()=>{\n  if(spillSlutt) return;\n  const felter = Array.from(document.querySelectorAll(\".kode-input\"));\n  const inns = felter.map(i=>i.value).join(\"\");\n  const m = $(\"hvelvMelding\");\n  if(inns.length < 4){\n    m.className = \"melding feil\";\n    m.textContent = \"Fyll inn alle fire sifrene.\";\n    return;\n  }\n  if(inns === kode()){\n    spillSlutt = true;\n    clearInterval(timerId);\n    stoppOpplesing();\n    felter.forEach(f=>f.classList.add(\"gronn\"));\n    sfxHvelv();\n    const ikon = $(\"hvelvIkon\");\n    ikon.classList.remove(\"snurrer\"); void ikon.offsetWidth; ikon.classList.add(\"snurrer\");\n    const brukt = totalSek - restSek;\n    const bm = Math.floor(brukt\u002F60), bs = brukt%60;\n    $(\"diplomNavn\").textContent = $(\"gruppenavn\").value.trim() || \"Hemmelig gruppe\";\n    $(\"diplomStat\").textContent =\n      \"Nivå: \" + nivaNavn() + \" · Tid brukt: \" + bm + \" min \" + bs + \" sek\";\n    setTimeout(()=>{\n      $(\"topplinje\").classList.remove(\"vis\");\n      visSkjerm(\"vunnet\");\n      myntregn(60);\n      lesOpp(\"vunnet\", TEKST.vunnet);\n    }, redusertBevegelse ? 300 : 1600);\n  } else {\n    sfxFeil();\n    m.className = \"melding feil\";\n    m.textContent = \"Hvelvet rikker seg ikke … Sjekk sifrene og rekkefølgen (rom 1–4)!\";\n    $(\"kodeRad\").classList.remove(\"skjelv\");\n    void $(\"kodeRad\").offsetWidth;\n    $(\"kodeRad\").classList.add(\"skjelv\");\n  }\n});\n\n\u002F* ================= MYNTREGN ================= *\u002F\nfunction myntregn(antall){\n  if(redusertBevegelse) return;\n  for(let i=0;i<antall;i++){\n    const m = document.createElement(\"div\");\n    m.className = \"mynt\";\n    m.textContent = \"🪙\";\n    m.style.left = Math.random()*100 + \"vw\";\n    m.style.animationDuration = (2 + Math.random()*2.5) + \"s\";\n    m.style.animationDelay = (Math.random()*0.8) + \"s\";\n    document.body.appendChild(m);\n    setTimeout(()=>m.remove(), 6000);\n  }\n}\n\n\u002F* ================= OMSTART ================= *\u002F\nfunction omstart(){\n  stoppOpplesing();\n  $(\"topplinje\").classList.remove(\"vis\");\n  visSkjerm(\"start\");\n}\n$(\"spillIgjen\").addEventListener(\"click\", omstart);\n$(\"provIgjen\").addEventListener(\"click\", omstart);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
