<!-- Delt Myntland-styling (fase 1: palett + fonter). Inline-stilene under overstyrer fortsatt det meste – trygg fallback. -->
<link rel="stylesheet" href="myntland.css">

<style>
:root {
  /* Worksheet-farger (må beholdes for A4-arket) */
  --yellow: #FFD93D;
  --orange: #FF8C42;
  --dark: #1c1c2e;
  --paper: #FFFEF8;
  --ink: #1a1a1a;
  /* Myntland-paletten hentes fra myntland.css */
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 40px;
}

/* ── HERO (Myntland-stil) ── */
.hero {
  background: linear-gradient(160deg, var(--teal-dark), #1a6648, var(--green));
  color: white;
  padding: 2.5rem 1.5rem 1.75rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 28px;
}

  /* Snurrende mynter i hero-bakgrunnen (bak innholdet) */
  .hero { isolation: isolate; }
  .hero-mynt {
    position: absolute;
    z-index: -1;
    opacity: 0.13;
    pointer-events: none;
    user-select: none;
    will-change: transform;
    animation: myntspinn var(--fart, 16s) linear infinite;
    animation-delay: var(--start, 0s);
  }
  @keyframes myntspinn {
    from { transform: perspective(700px) rotate(var(--tilt, 0deg)) rotateY(0deg); }
    to   { transform: perspective(700px) rotate(var(--tilt, 0deg)) rotateY(360deg); }
  }
  @media (prefers-reduced-motion: reduce) { .hero-mynt { animation: none; } }

.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(239, 159, 39, 0.15) 0%, transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(29, 158, 117, 0.18) 0%, transparent 45%);
  pointer-events: none;
}
.hero > * { position: relative; z-index: 2; }

/* ── TOPNAV (matcher utskriftsmateriell.html) ── */
.topnav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0.85rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topnav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.topnav-logo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  color: var(--teal-dark);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.topnav-logo::before { content: "🪙"; font-size: 1.4rem; }
.topnav-back {
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--green-dark);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.topnav-back:hover { color: var(--teal-dark); }

.hero-brand {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.12);
  padding: 6px 16px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.18);
}
.hero-brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 12px var(--amber);
}
.hero h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2rem, 6vw, 3.6rem);
  line-height: 1;
  color: white;
  letter-spacing: -0.01em;
}
.hero h1 .accent { color: var(--amber); }
.hero p {
  color: rgba(255,255,255,0.85);
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  margin-top: 10px; font-weight: 600;
  max-width: 520px; margin-left: auto; margin-right: auto;
}

.screen-only { max-width: 860px; margin: 0 auto 28px; padding: 0 16px; }

.monster-parade {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 8px; margin: 18px 0 0; flex-wrap: wrap;
}
.parade-monster {
  width: 64px; height: 64px; object-fit: contain;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
  animation: float 3s ease-in-out infinite;
}
.parade-monster:nth-child(2n) { animation-delay: -1s; }
.parade-monster:nth-child(3n) { animation-delay: -2s; }
.parade-monster:nth-child(4n) { animation-delay: -0.5s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-10px) rotate(1deg); }
}

/* ── CONTROLS (øvre rad) ── */
.controls {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 22px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 18px;
  margin-bottom: 18px;
}
.control-group label {
  display: block;
  color: var(--muted);
  font-weight: 800;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.control-group select,
.control-group input[type="number"],
.control-group input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.control-group select:hover,
.control-group input:hover { border-color: var(--teal); }
.control-group select:focus,
.control-group input:focus { border-color: var(--teal); }
.control-group select option { background: var(--white); color: var(--text); }

/* ── CHECKBOX / REGNEARTER ── */
.checkbox-group {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 24px 26px;
  margin-bottom: 18px;
}
.checkbox-group-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.35rem;
  color: var(--teal-dark);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.checkbox-group-sub {
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 18px;
}

/* Ny: vertikal rad-layout, én regneart per rad */
.checkbox-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cb-item {
  display: grid;
  grid-template-columns: auto 56px 1fr auto;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.cb-item:hover {
  border-color: var(--teal);
  background: var(--teal-light);
}
.cb-item input[type="checkbox"] { display: none; }
.cb-check {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid #bbb;
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 900;
  color: transparent;
  flex-shrink: 0;
  transition: all 0.15s;
}
.cb-item input:checked ~ .cb-check {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}
.cb-label {
  color: var(--text);
  font-weight: 800;
  font-size: 1.15rem;
}
.cb-pill {
  font-family: 'Fredoka One', cursive;
  font-size: 1.15rem;
  padding: 4px 0;
  border-radius: 10px;
  border: 1.5px solid;
  width: 56px;
  text-align: center;
  line-height: 1.2;
  justify-self: center;
}
.cb-add  .cb-pill { background: #d6f5d6; color: #1a5c1a; border-color: #1a5c1a; }
.cb-sub  .cb-pill { background: #ffe0e0; color: #8b0000; border-color: #8b0000; }
.cb-mul  .cb-pill { background: #fff3cc; color: #7a5500; border-color: #7a5500; }
.cb-div  .cb-pill { background: #d0eaff; color: #003e7a; border-color: #003e7a; }
.cb-txt  .cb-pill { background: #f0e0ff; color: #5a0080; border-color: #5a0080; }

/* Per-operasjon vanskelighetsvelger — nå større og mer lesbar */
.cb-level {
  background: var(--white);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  padding-right: 34px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.98rem;
  font-weight: 800;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  min-width: 140px;

#worksheet-wrap { max-width: 860px; margin: 0 auto; }

/*
  A4 = 210×297mm. At 96dpi screen that's ~794×1123px.

.worksheet {
  background: var(--paper);
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 10mm 16mm 14mm;
  border-radius: 10px;

.ws-corner { position: absolute; pointer-events: none; z-index: 0; }

.ws-corner.tl { top: -5mm; left: -5mm; }

.ws-corner.bl { bottom: -5mm; left: -5mm; }

.ws-content { position: relative; z-index: 1; }

/* Header */
.ws-header {
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, var(--green-dark), var(--green));

.tasks-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2.5mm 5mm; }

}
.task-num { font-size: 2.5mm; font-weight: 900; color: #bbb; min-width: 4mm; }

/* Grid writing field — bigger squares */
.grid-field {
  width: 100%;
  border: 0.5mm solid #333; border-radius: 1.5mm;
  overflow: hidden; background: white; position: relative;
}
.grid-field svg { display: block; width: 100%; height: 100%; }

/* Text task */
.txt-task-box {
  border: 0.5mm solid #333; border-radius: 3mm;

}
.txt-task-monster-wrap { float: right; margin: -1mm 0 2mm 3mm; }
.txt-task-monster-wrap img {

.grid-field-tall {
  width: 100%;

  overflow: hidden; background: white; position: relative;
}
.grid-field-tall svg { display: block; width: 100%; height: 100%; }

/* Footer */
.ws-footer {
  display: flex; align-items: center; justify-content: space-between;

  border-top: 0.4mm dashed #ccc;
  font-size: 2.5mm; color: #aaa; font-weight: 800;
}
.footer-monster { width: 9mm; height: 9mm; object-fit: contain; filter: drop-shadow(0 0.5mm 1.5mm rgba(0,0,0,0.15)); }

/* Separator between pages on screen */
.worksheet + .worksheet { margin-top: 24px; }

/* ── PRINT ── */
@media print {
  /* Ingen printer-margin — vi bruker hele A4-arket (210×297mm).
     OBS: Fysiske printere har som regel en liten ikke-utskrivbar sone
     (~3–5mm). Worksheet-innholdet har derfor egen padding (10/16/14mm)
     som holder all tekst trygt innenfor utskriftsområdet. */
  @page { size: A4; margin: 0; }
  body { background: none !important; padding: 0 !important; margin: 0; }
  .screen-only, .hero, .topnav { display: none !important; }

    transform: none !important;
    overflow: hidden;
    page-break-after: always;
    break-after: page;
  }
  /* Siste side skal ikke tvinge ny side etter seg */
  .worksheet:last-of-type {
    page-break-after: avoid;
    break-after: avoid;
  }
  .ws-corner img { opacity: 0.08 !important; }
}

<script>
const MONSTER_IMGS = [
  // Alle 20 Myntland-monstre. Bildene ligger på GitHub Pages og hentes per request;
  // det holder HTML-fila slank og lar oss oppdatere bildene sentralt uten å redigere her.
  "monsters/groennhaar.webp",  // Bjørk
  "monsters/appelsin.webp",  // Glød
  "monsters/rosa.webp",  // Rosa
  "monsters/graa.webp",  // Måne
  "monsters/moerkelilla.webp",  // Skygge
  "monsters/indigo.webp",  // Bølge
  "monsters/marineblaa.webp",  // Natt
  "monsters/vinroed.webp",  // Plomme
  "monsters/ildkatt.webp",  // Drage
  "monsters/gullgul.webp",  // Stjerne
  "monsters/gressgroenn.webp",  // Skog
  "monsters/rustbrun.webp",  // Rust
  "monsters/laksrosa.webp",  // Fersken
  "monsters/mintgroenn.webp",  // Mynte
  "monsters/solskinn.webp",  // Sol
  "monsters/turkis.webp",  // Tang
  "monsters/lilla.webp",  // Lilje
  "monsters/himmelblaa.webp",  // Bamse
  "monsters/beige.webp",  // Sand
  "monsters/havblaa.webp",  // Plask
];

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pickN(n){
  const idx=[...Array(MONSTER_IMGS.length).keys()].sort(()=>Math.random()-0.5);
  return Array.from({length:n},(_,i)=>MONSTER_IMGS[idx[i%idx.length]]);
}
function getRange(l){return l==='easy'?[1,20]:l==='medium'?[2,100]:[10,999];}

// Grid cells: 7mm wide × 10mm tall.
// ViewBox 1 unit = 1mm. Width varies per column layout:
//   4-col (add/sub): content 178mm, gap 3mm×3 = 9mm → each col ≈ (178-9)/4 = 42.25mm
//   2-col (mul/div): content 178mm, gap 5mm×1 = 5mm → each col ≈ (178-5)/2 = 86.5mm
//   text task: full width 178mm
let gridCounter = 0;

function makeGridField(heightMm, widthMm) {
  const id = 'gp' + (gridCounter++);
  const cw = 7, ch = 10; // cell width 7mm, height 10mm
  return `<div class="grid-field" style="height:${heightMm}mm">
    <svg viewBox="0 0 ${widthMm} ${heightMm}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="${id}" width="${cw}" height="${ch}" patternUnits="userSpaceOnUse">
          <path d="M ${cw} 0 L 0 0 0 ${ch}" fill="none" stroke="#b0cceb" stroke-width="0.3"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#${id})"/>
    </svg>
  </div>`;
}

function makeTallGridField(heightMm, widthMm = 178) {
  const id = 'gp' + (gridCounter++);
  const cw = 7, ch = 10;
  return `<div class="grid-field-tall" style="height:${heightMm}mm">
    <svg viewBox="0 0 ${widthMm} ${heightMm}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="${id}" width="${cw}" height="${ch}" patternUnits="userSpaceOnUse">
          <path d="M ${cw} 0 L 0 0 0 ${ch}" fill="none" stroke="#b0cceb" stroke-width="0.3"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#${id})"/>
    </svg>
  </div>`;
}

// Rutehøyde per regneart. For utfordrende mul/div trengs mer plass til oppstilt utregning.
// 5 rader (50mm) for add/sub, 7 rader (70mm) for utfordrende mul/div, 3 rader (30mm) ellers.
function gridHeightMm(type, level) {
  if (type === 'add' || type === 'sub') return 50;
  if ((type === 'mul' || type === 'div') && level === 'hard') return 70;
  return 30;
}

// Field width in mm per column layout
function fieldWidthMm(type, count) {
  // 4-col: (178 - 3*3) / 4 = 169/4 ≈ 42
  // 2-col: (178 - 1*5) / 2 = 173/2 ≈ 86
  // add/sub med 2 oppgaver: 2 kolonner → 86mm per felt (dobbel bredde)
  if (type === 'add' || type === 'sub') {
    return count === 2 ? 86 : 42;
  }
  return 86;
}

// Hjelpere for tekstoppgaver: velg tall fra et område + valgfri "snap" til fine verdier
function rr(min, max) { return rand(min, max); }
// Velg et "pent" tall i området [min, max] som er delelig med step (f.eks. 5, 10)
function niceNum(min, max, step) {
  const lo = Math.ceil(min / step), hi = Math.floor(max / step);
  return rr(lo, hi) * step;
}
// Tilfeldig element fra array
function pick(arr) { return arr[rr(0, arr.length - 1)]; }

// Monsternavn fra Myntland-universet — parallell-array til MONSTER_IMGS,
// så hvert navn matcher bildet på samme indeks. På den måten viser
// tekstoppgaven alltid det monsteret som faktisk er på bildet ved siden av.
// Alle 20 navn er faste i Myntland-universet — bruk samme navn på tvers av
// historier og oppgaver så elevene gjenkjenner monstrene.
const MONSTER_NAMES = [
  "Bjørk",    // groennhaar.webp
  "Glød",     // appelsin.webp
  "Rosa",     // rosa.webp
  "Måne",     // graa.webp
  "Skygge",   // moerkelilla.webp
  "Bølge",    // indigo.webp
  "Natt",     // marineblaa.webp
  "Plomme",   // vinroed.webp
  "Drage",    // ildkatt.webp
  "Stjerne",  // gullgul.webp
  "Skog",     // gressgroenn.webp
  "Rust",     // rustbrun.webp
  "Fersken",  // laksrosa.webp
  "Mynte",    // mintgroenn.webp
  "Sol",      // solskinn.webp
  "Tang",     // turkis.webp
  "Lilje",    // lilla.webp
  "Bamse",    // himmelblaa.webp
  "Sand",     // beige.webp
  "Plask",    // havblaa.webp
];
// Slå opp riktig navn for et gitt monsterbilde. Hvis bildet ikke matcher
// (skulle ikke skje), fall tilbake til første navn i listen.
function nameForImg(src) {
  const i = MONSTER_IMGS.indexOf(src);
  return i >= 0 ? MONSTER_NAMES[i] : MONSTER_NAMES[0];
}
// Tekstoppgavemalene kaller pickName() for å få et monsternavn å bruke.
// buildTextSection setter currentMonsterName til navnet som matcher
// bildet som faktisk vises, så tekst og bilde alltid stemmer.
let currentMonsterName = MONSTER_NAMES[0];
function pickName() { return currentMonsterName; }

// Realistiske tekstoppgaver. Hver mal har sin egen pick() som velger tall
// tilpasset scenarioet (en is koster 20–50 kr, ikke 399 kr).
const TEXTS = {
  easy:[
    // Kun addisjon og subtraksjon. Tall 10–99, hverdagsnære tellbare ting.
    {op:'add', pick:()=>[rr(12,60), rr(10,40)],
      t:(a,b)=>{const n=pickName(); return `${n} har ${a} klinkekuler og får ${b} til av en venn. Hvor mange klinkekuler har ${n} nå?`;}},
    {op:'sub', pick:()=>{const a=rr(30,95); return [a, rr(5, a-5)];},
      t:(a,b)=>{const n=pickName(); return `${n} har ${a} klistremerker og gir ${b} av dem til en venn. Hvor mange klistremerker har ${n} igjen?`;}},
    {op:'add', pick:()=>[rr(15,60), rr(10,40)],
      t:(a,b)=>`I klassen er det ${a} gutter og ${b} jenter. Hvor mange elever er det i klassen til sammen?`},
    {op:'sub', pick:()=>{const a=rr(40,95); return [a, rr(10, a-10)];},

function buildSection(type, label, symbol, pillClass, monsterSrc, count, level) {
  // Utfordrende multiplikasjon/divisjon trenger mer skriveplass til oppstilt
  // utregning, så vi begrenser antall oppgaver til maks 2 uansett lærerens valg.
  if ((type === 'mul' || type === 'div') && level === 'hard') {
    count = Math.min(count, 2);
  }
  const gridH = gridHeightMm(type, level);
  const gridW = fieldWidthMm(type, count);

  let tasks = [];
  for (let i = 0; i < count; i++) {
    let problem = '';
    if (type === 'add') {
      // Lett: 2+2 siffer (10–99), Middels: 2–3 siffer (10–999), Utfordrende: 3–4 siffer (100–9999)
      let mn, mx;
      if (level === 'easy')      { mn = 10;  mx = 99;   }
      else if (level === 'medium') { mn = 10;  mx = 999;  }
      else                         { mn = 100; mx = 9999; }
      problem = `${rand(mn,mx)} + ${rand(mn,mx)} =`;
    } else if (type === 'sub') {
      // Samme områder som addisjon, men sikrer positivt svar (a ≥ b)
      let mn, mx;
      if (level === 'easy')      { mn = 10;  mx = 99;   }
      else if (level === 'medium') { mn = 10;  mx = 999;  }
      else                         { mn = 100; mx = 9999; }
      const a = rand(mn, mx);
      const b = rand(mn, a);
      problem = `${a} \u2212 ${b} =`;
    } else if (type === 'mul') {
      // Lett: 1–5 gangen · 1–5
      // Middels: 1-siffer (2–9) · 10–50
      // Utfordrende: 2-siffer (10–99) · 2-siffer (10–99)
      let a, b;
      if (level === 'easy')        { a = rand(1,5);   b = rand(1,5);   }
      else if (level === 'medium') { a = rand(10,50); b = rand(2,9);   }
      else                         { a = rand(10,99); b = rand(10,99); }
      problem = `${a} \u00B7 ${b} =`;
    } else if (type === 'div') {
      // Lett: basert på 1–5 gangen (går alltid opp)
      // Middels: 10–100 delt på 2–10 (går alltid opp)
      // Utfordrende: 100–1000 delt på 2–30 (går alltid opp)
      let a, b;
      if (level === 'easy') {
        b = rand(1,5);
        a = b * rand(1,5);
      } else if (level === 'medium') {
        b = rand(2,10);
        // finn et produkt b·k som ligger i [10,100]
        const kMin = Math.max(1, Math.ceil(10 / b));
        const kMax = Math.floor(100 / b);
        const k = rand(kMin, Math.max(kMin, kMax));
        a = b * k;
      } else {
        b = rand(2,30);
        const kMin = Math.max(1, Math.ceil(100 / b));
        const kMax = Math.floor(1000 / b);
        const k = rand(kMin, Math.max(kMin, kMax));
        a = b * k;
      }
      problem = `${a} : ${b} =`;
    }
    tasks.push(`
      <div class="task-item">
        <div class="task-problem">
          <span class="task-num">${i+1}.</span>${problem}
        </div>
        ${makeGridField(gridH, gridW)}
      </div>`);
  }

  // Velg grid-layout: add/sub med 2 oppgaver bruker 2 kolonner (oppgavene
  // får dobbel bredde og ligger på én linje), ellers 4 kolonner. Mul/div
  // bruker alltid 2 kolonner.
  let gridClass;
  if (type === 'add' || type === 'sub') {
    gridClass = count === 2 ? 'tasks-grid-2' : 'tasks-grid-4';
  } else {
    gridClass = 'tasks-grid';
  }
  return `
    <div class="section-hd">
      <div class="section-pill ${pillClass}">
        <img src="${monsterSrc}" alt="">
        ${label} &nbsp;${symbol}
      </div>
      <div class="section-rule"></div>
    </div>
    <div class="${gridClass}">${tasks.join('')}</div>`;
}

// Velg passende tall (a, b) for én tekstoppgavetype og nivå.
// Returnerer [a, b] som maler kan bruke, uavhengig av tmpl.c-sjekken
// (den kjøres fortsatt etterpå for ekstra sikring).
function pickNumbersForText(op, level) {
  // Regne­arts­nivåene matcher spesifikasjonen:
  //   add/sub easy  : 2+2 siffer (10–99)
  //   add/sub med   : 2–3 siffer (10–999)
  //   add/sub hard  : 3–4 siffer (100–9999)
  //   mul    easy   : 1–5 · 1–5
  //   mul    med    : 1-siffer · 10–50
  //   mul    hard   : 2-siffer · 2-siffer
  //   div    easy   : basert på 1–5 gangen
  //   div    med    : 10–100 delt på 2–10
  //   div    hard   : 100–1000 delt på 2–30
  if (op === 'add' || op === 'sub') {
    let mn, mx;
    if (level === 'easy')        { mn = 10;  mx = 99;   }
    else if (level === 'medium') { mn = 10;  mx = 999;  }
    else                          { mn = 100; mx = 9999; }
    const a = rand(mn, mx);
    // For sub: b ≤ a. For add: fritt, men samme skala.
    const b = op === 'sub' ? rand(mn, a) : rand(mn, mx);
    return [a, b];
  }
  if (op === 'mul') {
    if (level === 'easy')        return [rand(1,5),   rand(1,5)];
    if (level === 'medium')      return [rand(10,50), rand(2,9)];
    return [rand(10,99), rand(10,99)];
  }
  if (op === 'div') {
    let b, a;
    if (level === 'easy') {
      b = rand(1,5);
      a = b * rand(1,5);
    } else if (level === 'medium') {
      b = rand(2,10);
      const kMin = Math.max(1, Math.ceil(10 / b));
      const kMax = Math.floor(100 / b);
      a = b * rand(kMin, Math.max(kMin, kMax));
    } else {
      b = rand(2,30);
      const kMin = Math.max(1, Math.ceil(100 / b));
      const kMax = Math.floor(1000 / b);
      a = b * rand(kMin, Math.max(kMin, kMax));
    }
    return [a, b];
  }
  // Økonomi: priser/beløp i kroner (hard-nivå)
  if (op === 'eco') {
    // Velg pris 20–500, antall 2–12, eller beløp/pris som går opp
    const a = rand(50, 500);
    const b = rand(2, 12);
    return [a, b];
  }
  // Brøk: a må være delelig med b (2, 3 eller 4)
  if (op === 'frac') {
    const b = [2,3,4][rand(0,2)];
    const k = rand(4, 20); // 4·2 = 8 … 20·4 = 80
    const a = b * k;
    return [a, b];
  }
  // Prosent: velg prosenter som gir hele tall (10, 20, 25, 50)
  if (op === 'pct') {
    const pcts = [10, 20, 25, 50];
    const b = pcts[rand(0, pcts.length-1)];
    // a må være delelig med 100/gcd slik at a·b/100 blir heltall
    // 10% → delelig med 10, 20% → 5, 25% → 4, 50% → 2
    const step = b === 10 ? 10 : b === 20 ? 5 : b === 25 ? 4 : 2;
    const a = step * rand(20, 200); // gir priser 40–2000
    return [a, b];
  }
  // Måling: tall som passer meter/minutter/kg-oppgaver
  if (op === 'meas') {
    // Bruk blanding: lengde i hele 100-meter, eller minutter 30–180
    const a = rand(1, 10) * 500; // 500–5000 meter
    const b = rand(2, 7);
    return [a, b];
  }
  // Fallback
  return [rand(10, 100), rand(2, 10)];
}

function buildTextSection(monsterSrc, level, allowedOps) {
  // Sett aktivt monsternavn til det som matcher bildet, så pickName() i
  // tekstmalene returnerer navnet som hører til monsteret på bildet.
  currentMonsterName = nameForImg(monsterSrc);

  const fullPool = TEXTS[level];

  // Filtrer poolen til kun maler som matcher valgte regnearter.
  // For hard-nivå inkluderer vi ALLTID de utvidede kategoriene
  // (eco/frac/pct/meas) fordi de er egne spesialoppgaver som ikke
  // er knyttet til de fire vanlige regneartene – eleven skal utsettes
  // for dem uavhengig av hvilke vanlige regnearter som er huket av.
  const extraOps = ['eco','frac','pct','meas'];
  let pool = fullPool.filter(tmpl =>
    allowedOps.includes(tmpl.op) || extraOps.includes(tmpl.op)
  );
  // Fallback: hvis ingen maler matcher (f.eks. brukeren valgte bare
  // "tekstoppgave" uten andre regnearter og vi er på easy/medium), bruk hele poolen.
  if (pool.length === 0) pool = fullPool;

  // Forsøk opptil 100 ganger å finne en gyldig (tmpl, a, b)-kombinasjon
  let tmpl, a, b, ok = false;
  for (let tries = 0; tries < 100 && !ok; tries++) {
    tmpl = pool[rand(0, pool.length-1)];
    // Nye maler har sin egen pick() som gir realistiske tall per scenario.
    // Fallback til den generiske pickNumbersForText hvis en eldre mal mangler pick.
    [a, b] = tmpl.pick ? tmpl.pick() : pickNumbersForText(tmpl.op, level);
    ok = !tmpl.c || tmpl.c(a, b);
  }

  return `
    <div class="section-hd">
      <div class="section-pill pill-txt">
        <img src="${monsterSrc}" alt="">
        Tekstoppgave
      </div>
      <div class="section-rule"></div>
    </div>
    <div class="txt-task-box">
      <div class="txt-task-monster-wrap">
        <img id="txt-monster-img" src="${monsterSrc}" alt="">
      </div>
      <div class="txt-problem">${tmpl.t(a,b)}</div>
      <div style="clear:both"></div>
      <div class="txt-answer-label">Svar og utregning:</div>
      ${makeTallGridField(50, 178)}
    </div>`;
}

      <div class="ws-info-field">Navn:&nbsp;</div>
      <div class="ws-info-field">Dato:&nbsp;</div>
      <div class="ws-info-field">Klasse:&nbsp;<span style="font-weight:900;color:#222">${cls}</span></div>
    </div>

    <div>${sectionsHtml}</div>

    <div class="ws-footer">
      <div style="display:flex;align-items:center;gap:2mm">
        <img class="footer-monster" src="${footerMonster}" alt="">
        <span>Myntland Mattelekse</span>
      </div>
      <div>${pageIndicator}<span>${cls}</span></div>
    </div>
  </div>
</div>`;
}

// Omtrentlig høydebudsjett for innholdet på én A4-side.
// Ved utskrift har vi 297mm tilgjengelig (full A4, @page margin: 0),
// minus worksheet-padding (10mm topp + 14mm bunn = 24mm),
// minus header (~20mm) + info-linje (~8mm) + footer (~12mm) = 40mm.
// Det gir 297 - 24 - 40 = 233mm reell plass. Sett til 232 for sikkerhet.
const PAGE_CONTENT_BUDGET_MM = 232;

// Estimert høyde i mm per seksjon.
// add/sub bruker 4-kolonne-layout med fast rutehøyde, så høyden er nær konstant.
// mul/div bruker 2-kolonne-layout: ceil(count/2) rader, høyde per rad varierer
// med nivå (utfordrende gir 7 rader = 70mm + padding ≈ 77.5mm per rad).
// tekstoppgave har ett spørsmål + et 50mm rutenett + padding.
function estimateSectionHeightMm(type, count, level) {
  if (type === 'add' || type === 'sub') return 67;
  if (type === 'mul' || type === 'div') {
    // På utfordrende nivå kappes count til 2 (samme logikk som i buildSection)
    const effectiveCount = level === 'hard' ? Math.min(count, 2) : count;
    const rowHeight = level === 'hard' ? 77.5 : 37.5;
    return 14 + Math.ceil(effectiveCount / 2) * rowHeight;
  }
  if (type === 'txt') return 85;
  return 0;
}

function generateWorksheet() {
  const week   = parseInt(document.getElementById('ctrl-week').value)||17;
  const cls    = document.getElementById('ctrl-class').value||'3. trinn';
  const count  = parseInt(document.getElementById('ctrl-count').value);

  const useAdd = document.getElementById('cb-add').checked;
  const useSub = document.getElementById('cb-sub').checked;
  const useMul = document.getElementById('cb-mul').checked;
  const useDiv = document.getElementById('cb-div').checked;
  const useTxt = document.getElementById('cb-txt').checked;

  // Individuelle vanskelighetsgrader per regneart
  const lvlAdd = document.getElementById('lvl-add').value;
  const lvlSub = document.getElementById('lvl-sub').value;
  const lvlMul = document.getElementById('lvl-mul').value;
  const lvlDiv = document.getElementById('lvl-div').value;
  const lvlTxt = document.getElementById('lvl-txt').value;

  if (!useAdd && !useSub && !useMul && !useDiv && !useTxt) {
    alert('Velg minst én regneart!'); return;
  }

  // Hvilke regnearter er valgt (brukes til å filtrere tekstoppgavepoolen
  // så tekstoppgaven kun inneholder operasjoner eleven jobber med)
  const allowedOps = [];
  if (useAdd) allowedOps.push('add');
  if (useSub) allowedOps.push('sub');
  if (useMul) allowedOps.push('mul');
  if (useDiv) allowedOps.push('div');

  // Plukk nok monster-bilder til begge sidene (maks 24)
  const imgs = pickN(24);
  let imgIdx = 1;

  // Bygg alle valgte seksjoner som {type, html, heightMm}-poster
  const sections = [];
  if (useAdd) sections.push({type:'add', html: buildSection('add','Addisjon',      '+','pill-add', imgs[imgIdx++], count, lvlAdd), heightMm: estimateSectionHeightMm('add', count, lvlAdd)});
  if (useSub) sections.push({type:'sub', html: buildSection('sub','Subtraksjon',   '−','pill-sub', imgs[imgIdx++], count, lvlSub), heightMm: estimateSectionHeightMm('sub', count, lvlSub)});
  if (useMul) sections.push({type:'mul', html: buildSection('mul','Multiplikasjon','·','pill-mul', imgs[imgIdx++], count, lvlMul), heightMm: estimateSectionHeightMm('mul', count, lvlMul)});
  if (useDiv) sections.push({type:'div', html: buildSection('div','Divisjon',      ':','pill-div', imgs[imgIdx++], count, lvlDiv), heightMm: estimateSectionHeightMm('div', count, lvlDiv)});
  if (useTxt) sections.push({type:'txt', html: buildTextSection(imgs[imgIdx++], lvlTxt, allowedOps),                               heightMm: estimateSectionHeightMm('txt', count, lvlTxt)});

  // ─────────────────────────────────────────────────────────────
  // SIDEFORDELING — finner den mest plasseffektive måten å pakke
  // seksjoner på sider:
  //   1. Hvis alt får plass på én side → bruk én side
  //   2. Ellers: prøv ALLE måter å splitte seksjonene over 2 sider
  //      og velg en fordeling der begge sider er innenfor budsjett.
  //      Vi foretrekker fordelingen som gir minst høydeforskjell
  //      (mest balansert layout). Logisk rekkefølge er
  //      add → sub → mul → div → txt; vi sorterer hver side
  //      etter denne rekkefølgen etter splitting.
  //   3. Hvis ingen 2-side-fordeling passer (svært sjeldent),
  //      fall tilbake til greedy som kan gi 3+ sider.
  // ─────────────────────────────────────────────────────────────
  const totalHeight = sections.reduce((sum, s) => sum + s.heightMm, 0);
  let pages = [[]];

  // Logisk rekkefølge for seksjoner innen en side
  const sectionOrder = { add: 0, sub: 1, mul: 2, div: 3, txt: 4 };
  const sortSections = arr => arr.slice().sort((a, b) =>
    (sectionOrder[a.type] ?? 99) - (sectionOrder[b.type] ?? 99)
  );

  if (totalHeight <= PAGE_CONTENT_BUDGET_MM) {
    // Alt får plass på én side
    pages[0] = sortSections(sections);
  } else {
    // Prøv alle 2^N måter å splitte seksjonene over 2 sider.
    // For hver fordeling, sjekk om begge sider er innenfor budsjett.
    // Velg fordelingen som:
    //   1. Bevarer logisk rekkefølge så godt som mulig (add→sub→mul→div→txt
    //      bør være på "side 1 først, side 2 etterpå")
    //   2. Ved likhet i rekkefølge: balanserer sidene best (minst diff)
    const n = sections.length;
    let bestSplit = null;
    let bestScore = Infinity;

    for (let mask = 1; mask < (1 << n) - 1; mask++) {
      const p1 = [], p2 = [];
      for (let i = 0; i < n; i++) {
        if (mask & (1 << i)) p1.push(sections[i]);
        else p2.push(sections[i]);
      }
      const h1 = p1.reduce((s, x) => s + x.heightMm, 0);
      const h2 = p2.reduce((s, x) => s + x.heightMm, 0);
      if (h1 <= PAGE_CONTENT_BUDGET_MM && h2 <= PAGE_CONTENT_BUDGET_MM) {
        const sortedP1 = sortSections(p1);
        const sortedP2 = sortSections(p2);
        // Bestem hvilken side som skal være "side 1" basert på første
        // seksjon i logisk rekkefølge.
        const firstP1 = sortedP1[0] ? (sectionOrder[sortedP1[0].type] ?? 99) : 99;
        const firstP2 = sortedP2[0] ? (sectionOrder[sortedP2[0].type] ?? 99) : 99;
        const side1 = firstP1 <= firstP2 ? sortedP1 : sortedP2;
        const side2 = firstP1 <= firstP2 ? sortedP2 : sortedP1;

        // Rekkefølge-poengsum: tell antall "brudd" på logisk rekkefølge.
        // Et brudd er hvis side 2 har en seksjon som logisk kommer FØR
        // en seksjon på side 1. Lavere er bedre.
        const maxSide1 = Math.max(...side1.map(s => sectionOrder[s.type] ?? 99));
        const minSide2 = Math.min(...side2.map(s => sectionOrder[s.type] ?? 99));
        const brudd = maxSide1 > minSide2 ? 1 : 0;

        // Balanse-poengsum: høydeforskjell normalisert (0-1)
        const balanse = Math.abs(h1 - h2) / PAGE_CONTENT_BUDGET_MM;

        // Hovedpoengsum: brudd veier mye mer enn balanse
        const score = brudd * 100 + balanse;

        if (score < bestScore) {
          bestScore = score;
          bestSplit = { side1, side2 };
        }
      }
    }

    if (bestSplit) {
      pages = [bestSplit.side1, bestSplit.side2];
    } else {
      // Fallback: greedy packing (kan gi 3+ sider). Skal i praksis
      // aldri skje, men er en trygghet for ekstreme tilfeller.
      pages = [[]];
      let currentPageHeight = 0;
      for (const s of sections) {
        const fitsCurrent = currentPageHeight + s.heightMm <= PAGE_CONTENT_BUDGET_MM;
        if (!fitsCurrent && pages[pages.length - 1].length > 0) {
          pages.push([]);
          currentPageHeight = 0;
        }
        pages[pages.length - 1].push(s);
        currentPageHeight += s.heightMm;
      }
    }
  }

  // Sikkerhet: tom første side → flytt opp
  if (pages[0].length === 0 && pages.length > 1) {
    pages.shift();
  }

  const numPages = pages.length;
  const pagesHtml = pages.map(p => p.map(s => s.html).join(''));

  const wrap = document.getElementById('worksheet-wrap');
  let html = '';

  // Vi har 24 monster-bilder å fordele over sidene. Hver side bruker
  // 6 (header, footer, 4 hjørner), så vi har plass til 4 sider med
  // unike bilder. For flere sider, gjenbruker vi fra start.
  for (let p = 0; p < numPages; p++) {
    const off = (p * 6) % 24;
    html += buildPage({
      week, cls,
      sectionsHtml: pagesHtml[p],
      headerMonster: imgs[off],
      footerMonster: imgs[(off + 1) % 24],
      cornerTl: imgs[(off + 2) % 24],
      cornerTr: imgs[(off + 3) % 24],
      cornerBl: imgs[(off + 4) % 24],
      cornerBr: imgs[(off + 5) % 24],
      pageLabel: numPages > 1 ? `Side ${p+1} av ${numPages}` : null
    });
  }

  wrap.innerHTML = html;
}

// Init parade
(function(){
  const parade = document.getElementById('parade');
  // Vis 9 tilfeldige monstre i paraden — flere blir for tett på header
  const paradeMonsters = [...MONSTER_IMGS].sort(()=>Math.random()-0.5).slice(0, 9);
  paradeMonsters.forEach(src=>{
    const img = document.createElement('img');
    img.className='parade-monster'; img.src=src; img.alt='';
    parade.appendChild(img);
  });
  const now=new Date(), start=new Date(now.getFullYear(),0,1);
  const week=Math.ceil(((now-start)/86400000+start.getDay()+1)/7);
  document.getElementById('ctrl-week').value=week;
  generateWorksheet();
})();
</script>
<!-- Mynt-ikon: bytter 🪙-emojien til eget bilde overalt (også dynamisk innhold) -->
<style>.myntico{height:1em;width:auto;vertical-align:-0.16em;margin:0 .04em}</style>
<script>
(function(){
  var COIN='\uD83E\uDE99'; // 🪙
  function convert(node){
    if(!node) return;
    if(node.nodeType===3){
      var v=node.nodeValue;
      if(!v || v.indexOf(COIN)===-1) return;
      var p=node.parentNode; if(!p) return;
      var tag=p.nodeName;
      if(tag==='SCRIPT'||tag==='STYLE'||tag==='TEXTAREA') return;
      var parts=v.split(COIN), frag=document.createDocumentFragment();
      for(var i=0;i<parts.length;i++){
        if(parts[i]) frag.appendChild(document.createTextNode(parts[i]));
        if(i<parts.length-1){
          var img=document.createElement('img');
          img.className='myntico'; img.src='mynt.webp'; img.alt='mynt';
          frag.appendChild(img);
        }
      }
      p.replaceChild(frag,node);
    } else if(node.nodeType===1){
      var t=node.nodeName;
      if(t==='SCRIPT'||t==='STYLE'||t==='TEXTAREA'||t==='INPUT') return;
      var kids=Array.prototype.slice.call(node.childNodes);
      for(var i=0;i<kids.length;i++) convert(kids[i]);
    }
  }
  function run(){ try{ convert(document.body); }catch(e){} }
  try{
    var obs=new MutationObserver(function(muts){
      for(var i=0;i<muts.length;i++){
        var m=muts[i];
        if(m.type==='childList'){ for(var j=0;j<m.addedNodes.length;j++) convert(m.addedNodes[j]); }
        else if(m.type==='characterData'){ convert(m.target); }
      }
    });
    obs.observe(document.body,{childList:true,subtree:true,characterData:true});
  }catch(e){}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run);
  else run();
})();
</script>
