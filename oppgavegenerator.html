<style>
:root {
  /* Worksheet-farger (må beholdes for A4-arket) */
  --yellow: #FFD93D;
  --orange: #FF8C42;
  --dark: #1c1c2e;
  --paper: #FFFEF8;
  --ink: #1a1a1a;
  /* Myntland-farger (fra lærer/elev-portalene) */
  --teal: #1a5fa5;
  --teal-light: #dbeafe;
  --teal-dark: #1e0f52;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #085041;
  --amber: #EF9F27;
  --amber-dark: #d4890f;
  --amber-light: #FAEEDA;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --bg: #F7F9F7;
  --white: #fff;
  --text: #1a2e1a;
  --muted: #5a7a5a;
  --border: #c8dfc8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 40px;
}

/* ── HERO (Myntland-stil) ── */
.hero {
  background: linear-gradient(160deg, var(--teal-dark), #1a6648, var(--green));
  color: white;
  padding: 2.5rem 1.5rem 1.75rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 28px;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(239, 159, 39, 0.15) 0%, transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(29, 158, 117, 0.18) 0%, transparent 45%);
  pointer-events: none;
}
.hero > * { position: relative; z-index: 2; }

.hero-brand {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.12);
  padding: 6px 16px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.18);
}
.hero-brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 12px var(--amber);
}
.hero h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2rem, 6vw, 3.6rem);
  line-height: 1;
  color: white;
  letter-spacing: -0.01em;
}
.hero h1 .accent { color: var(--amber); }
.hero p {
  color: rgba(255,255,255,0.85);
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  margin-top: 10px; font-weight: 600;
  max-width: 520px; margin-left: auto; margin-right: auto;
}

.screen-only { max-width: 860px; margin: 0 auto 28px; padding: 0 16px; }

.monster-parade {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 8px; margin: 18px 0 0; flex-wrap: wrap;
}
.parade-monster {
  width: 64px; height: 64px; object-fit: contain;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
  animation: float 3s ease-in-out infinite;
}
.parade-monster:nth-child(2n) { animation-delay: -1s; }
.parade-monster:nth-child(3n) { animation-delay: -2s; }
.parade-monster:nth-child(4n) { animation-delay: -0.5s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-10px) rotate(1deg); }
}

/* ── CONTROLS (øvre rad) ── */
.controls {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 22px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 18px;
  margin-bottom: 18px;
}
.control-group label {
  display: block;
  color: var(--muted);
  font-weight: 800;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.control-group select,
.control-group input[type="number"],
.control-group input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.control-group select:hover,
.control-group input:hover { border-color: var(--teal); }
.control-group select:focus,
.control-group input:focus { border-color: var(--teal); }
.control-group select option { background: var(--white); color: var(--text); }

/* ── CHECKBOX / REGNEARTER ── */
.checkbox-group {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 24px 26px;

/* Ny: vertikal rad-layout, én regneart per rad */
.checkbox-row {
  display: flex;
  flex-direction: column;

}
.cb-item {

}
.cb-pill {

  align-items: center;

  font-size: 0.85rem;

.cb-add  .cb-pill { background: #d6f5d6; color: #1a5c1a; border-color: #1a5c1a; }
.cb-sub  .cb-pill { background: #ffe0e0; color: #8b0000; border-color: #8b0000; }

/* Når regnearten ikke er valgt: demp visuelt */

.cb-item:has(input:not(:checked)) .cb-pill,

/* Mobil: stable opp innholdet pent */

/* ══ WORKSHEET ══ */
#worksheet-wrap { max-width: 860px; margin: 0 auto; }

/*
  A4 = 210×297mm. At 96dpi screen that's ~794×1123px.
  We use exact A4 proportions and scale for screen.
*/
.worksheet {
  background: var(--paper);
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 7mm 16mm 8mm;
  border-radius: 10px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.55);

  transform-origin: top center;
}

.ws-corner { position: absolute; pointer-events: none; z-index: 0; }
.ws-corner img { opacity: 0.12; width: 28mm; height: 28mm; object-fit: contain; }
.ws-corner.tl { top: -5mm; left: -5mm; }
.ws-corner.tr { top: -5mm; right: -5mm; transform: scaleX(-1); }
.ws-corner.bl { bottom: -5mm; left: -5mm; }
.ws-corner.br { bottom: -5mm; right: -5mm; transform: scaleX(-1); }

/* Header */
.ws-header {
  display: flex; align-items: center; justify-content: space-between;

.tasks-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5mm 5mm; }
.tasks-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5mm 4mm; }

/* Grid writing field — eksakt 7mm × 10mm ruter, alltid hele ruter */

/* Tekstoppgaver i full-side modus: 2 stk under hverandre med god plass */

/* Footer */

/* Separator between pages on screen */
.worksheet + .worksheet { margin-top: 24px; }

/* ── PRINT ── */
@media print {
  /* Gi skriveren en liten sikkerhetssone (6mm) langs kantene så
     bunntekst og andre elementer ikke havner i den ikke-utskrivbare
     sonen på fysiske printere. Vi kompenserer for marginen i selve
     .worksheet ved å trekke fra bredden/høyden. */
  @page { size: A4; margin: 6mm; }
  body { background: none !important; padding: 0 !important; margin: 0; }
  .screen-only, .hero { display: none !important; }
  #worksheet-wrap { max-width: none; margin: 0; }
  .worksheet {
    box-shadow: none !important;
    border-radius: 0 !important;
    width: 198mm !important;           /* 210 − 2·6 */
    min-height: 285mm !important;      /* 297 − 2·6 */
    max-height: 285mm !important;
    margin: 0 !important;
    transform: none !important;
    overflow: hidden;
    page-break-after: always;
    break-after: page;
  }
  /* Siste side skal ikke tvinge ny side etter seg */
  .worksheet:last-of-type {
    page-break-after: avoid;
    break-after: avoid;
  }
  .ws-corner img { opacity: 0.08 !important; }
}

  <!-- Sider genereres dynamisk av JS (1 eller 2 sider ved behov) -->

<script>
const MONSTER_IMGS = [
  "worksheet/monsters/01.webp",
  "worksheet/monsters/02.webp",
  "worksheet/monsters/03.webp",
  "worksheet/monsters/04.webp",
  "worksheet/monsters/05.webp",
  "worksheet/monsters/06.webp",
  "worksheet/monsters/07.webp",
  "worksheet/monsters/08.webp",
  "worksheet/monsters/09.webp",
  "worksheet/monsters/10.webp",
  "worksheet/monsters/11.webp",
  "worksheet/monsters/12.webp",
  "worksheet/monsters/13.webp",
  "worksheet/monsters/14.webp",
  "worksheet/monsters/15.webp",
  "worksheet/monsters/16.webp",
  "worksheet/monsters/17.webp",
  "worksheet/monsters/18.webp",
  "worksheet/monsters/19.webp",
  "worksheet/monsters/20.webp",
  "worksheet/monsters/21.webp",
];

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
// Plukk n monster-bilder. Hvis n er større enn antall unike bilder,
// gjenbruker vi pent: vi stokker bunken på nytt for hver "runde" så
// rekkefølgen ikke gjentar seg identisk.
function pickN(n){
  const result = [];
  const total = MONSTER_IMGS.length;
  while (result.length < n) {
    const shuffled = [...MONSTER_IMGS].sort(() => Math.random() - 0.5);
    const remaining = n - result.length;
    result.push(...shuffled.slice(0, Math.min(remaining, total)));
  }
  return result;
}
function getRange(l){return l==='easy'?[1,20]:l==='medium'?[2,100]:[10,999];}

// Grid cells: ALLTID nøyaktig 7mm bred × 10mm høy. Ingen delvise ruter.
// Vi snapper bredden ned til nærmeste multiplum av 7 og høyden ned til
// nærmeste multiplum av 10. SVG-en tegnes med preserveAspectRatio "xMinYMin meet"
// og .grid-field får eksplisitt bredde/høyde i mm slik at rutene ikke strekkes.
const CELL_W_MM = 7;
const CELL_H_MM = 10;

function snapWidthToCells(widthMm)  { return Math.floor(widthMm  / CELL_W_MM) * CELL_W_MM; }
function snapHeightToCells(heightMm){ return Math.floor(heightMm / CELL_H_MM) * CELL_H_MM; }

let gridCounter = 0;

function makeGridField(heightMm, widthMm) {
  const id = 'gp' + (gridCounter++);
  // Snap til hele ruter — ingen delvise ruter skal vises
  const w = snapWidthToCells(widthMm);
  const h = snapHeightToCells(heightMm);
  return `<div class="grid-field" style="width:${w}mm;height:${h}mm">
    <svg viewBox="0 0 ${w} ${h}" width="${w}mm" height="${h}mm" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="${id}" width="${CELL_W_MM}" height="${CELL_H_MM}" patternUnits="userSpaceOnUse">
          <path d="M ${CELL_W_MM} 0 L 0 0 0 ${CELL_H_MM}" fill="none" stroke="#b0cceb" stroke-width="0.3"/>
        </pattern>
      </defs>
      <rect width="${w}" height="${h}" fill="url(#${id})"/>
    </svg>
  </div>`;
}

function makeTallGridField(heightMm, widthMm = 175) {
  const id = 'gp' + (gridCounter++);
  const w = snapWidthToCells(widthMm);
  const h = snapHeightToCells(heightMm);
  return `<div class="grid-field-tall" style="width:${w}mm;height:${h}mm">
    <svg viewBox="0 0 ${w} ${h}" width="${w}mm" height="${h}mm" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="${id}" width="${CELL_W_MM}" height="${CELL_H_MM}" patternUnits="userSpaceOnUse">
          <path d="M ${CELL_W_MM} 0 L 0 0 0 ${CELL_H_MM}" fill="none" stroke="#b0cceb" stroke-width="0.3"/>
        </pattern>
      </defs>
      <rect width="${w}" height="${h}" fill="url(#${id})"/>
    </svg>
  </div>`;
}

// Rutehøyde per regneart. For utfordrende mul/div trengs mer plass til oppstilt utregning.
// 5 rader (50mm) for add/sub, 7 rader (70mm) for utfordrende mul/div, 3 rader (30mm) ellers.
function gridHeightMm(type, level) {
  if (type === 'add' || type === 'sub') return 50;
  if ((type === 'mul' || type === 'div') && level === 'hard') return 70;
  return 30;
}

// Field width in mm per column layout
function fieldWidthMm(type, count) {
  // 4-col: (178 - 3*3) / 4 = 169/4 ≈ 42
  // 2-col: (178 - 1*5) / 2 = 173/2 ≈ 86
  // add/sub med 2 oppgaver: 2 kolonner → 86mm per felt (dobbel bredde)
  if (type === 'add' || type === 'sub') {
    return count === 2 ? 86 : 42;
  }
  return 86;
}

// Hjelpere for tekstoppgaver: velg tall fra et område + valgfri "snap" til fine verdier
function rr(min, max) { return rand(min, max); }
// Velg et "pent" tall i området [min, max] som er delelig med step (f.eks. 5, 10)
function niceNum(min, max, step) {
  const lo = Math.ceil(min / step), hi = Math.floor(max / step);
  return rr(lo, hi) * step;
}
// Tilfeldig element fra array
function pick(arr) { return arr[rr(0, arr.length - 1)]; }

// Realistiske tekstoppgaver. Hver mal har sin egen pick() som velger tall
// tilpasset scenarioet (en is koster 20–50 kr, ikke 399 kr).
const TEXTS = {
  easy:[
    // Kun addisjon og subtraksjon. Tall 10–99, hverdagsnære tellbare ting.
    {op:'add', pick:()=>[rr(12,60), rr(10,40)],
      t:(a,b)=>`Lukas har ${a} klinkekuler. Han får ${b} til av bestefar. Hvor mange klinkekuler har han nå?`},
    {op:'sub', pick:()=>{const a=rr(30,95); return [a, rr(5, a-5)];},

function buildSection(type, label, symbol, pillClass, monsterSrc, count, level) {
  // Utfordrende multiplikasjon/divisjon trenger mer skriveplass til oppstilt
  // utregning, så vi begrenser antall oppgaver til maks 2 uansett lærerens valg.
  if ((type === 'mul' || type === 'div') && level === 'hard') {
    count = Math.min(count, 2);
  }
  const gridH = gridHeightMm(type, level);
  const gridW = fieldWidthMm(type, count);

  let tasks = [];
  for (let i = 0; i < count; i++) {
    let problem = '';
    if (type === 'add') {
      // Lett: 2+2 siffer (10–99), Middels: 2–3 siffer (10–999), Utfordrende: 3–4 siffer (100–9999)
      let mn, mx;
      if (level === 'easy')      { mn = 10;  mx = 99;   }
      else if (level === 'medium') { mn = 10;  mx = 999;  }
      else                         { mn = 100; mx = 9999; }
      problem = `${rand(mn,mx)} + ${rand(mn,mx)} =`;
    } else if (type === 'sub') {
      // Samme områder som addisjon, men sikrer positivt svar (a ≥ b)
      let mn, mx;
      if (level === 'easy')      { mn = 10;  mx = 99;   }
      else if (level === 'medium') { mn = 10;  mx = 999;  }
      else                         { mn = 100; mx = 9999; }
      const a = rand(mn, mx);
      const b = rand(mn, a);
      problem = `${a} \u2212 ${b} =`;
    } else if (type === 'mul') {
      // Lett: 1–5 gangen · 1–5
      // Middels: 1-siffer (2–9) · 10–50
      // Utfordrende: 2-siffer (10–99) · 2-siffer (10–99)
      let a, b;
      if (level === 'easy')        { a = rand(1,5);   b = rand(1,5);   }
      else if (level === 'medium') { a = rand(10,50); b = rand(2,9);   }
      else                         { a = rand(10,99); b = rand(10,99); }
      problem = `${a} \u00B7 ${b} =`;
    } else if (type === 'div') {
      // Lett: basert på 1–5 gangen (går alltid opp)
      // Middels: 10–100 delt på 2–10 (går alltid opp)
      // Utfordrende: 100–1000 delt på 2–30 (går alltid opp)
      let a, b;
      if (level === 'easy') {
        b = rand(1,5);
        a = b * rand(1,5);
      } else if (level === 'medium') {
        b = rand(2,10);
        // finn et produkt b·k som ligger i [10,100]
        const kMin = Math.max(1, Math.ceil(10 / b));
        const kMax = Math.floor(100 / b);
        const k = rand(kMin, Math.max(kMin, kMax));
        a = b * k;
      } else {
        b = rand(2,30);
        const kMin = Math.max(1, Math.ceil(100 / b));
        const kMax = Math.floor(1000 / b);
        const k = rand(kMin, Math.max(kMin, kMax));
        a = b * k;
      }
      problem = `${a} : ${b} =`;
    }
    tasks.push(`
      <div class="task-item">
        <div class="task-problem">
          <span class="task-num">${i+1}.</span>${problem}
        </div>
        ${makeGridField(gridH, gridW)}
      </div>`);
  }

  // Velg grid-layout: add/sub med 2 oppgaver bruker 2 kolonner (oppgavene
  // får dobbel bredde og ligger på én linje), ellers 4 kolonner. Mul/div
  // bruker alltid 2 kolonner.
  let gridClass;
  if (type === 'add' || type === 'sub') {
    gridClass = count === 2 ? 'tasks-grid-2' : 'tasks-grid-4';
  } else {
    gridClass = 'tasks-grid';
  }
  return `
    <div class="section-hd">
      <div class="section-pill ${pillClass}">
        <img src="${monsterSrc}" alt="">
        ${label} &nbsp;${symbol}
      </div>
      <div class="section-rule"></div>
    </div>
    <div class="${gridClass}">${tasks.join('')}</div>`;
}

// Genererer ett enkelt regne-stykke for arbeidsark-modus
function generateProblem(type, level) {
  if (type === 'add') {
    let mn, mx;
    if (level === 'easy')        { mn = 10;  mx = 99;   }
    else if (level === 'medium') { mn = 10;  mx = 999;  }
    else                          { mn = 100; mx = 9999; }
    return `${rand(mn,mx)} + ${rand(mn,mx)} =`;
  }
  if (type === 'sub') {
    let mn, mx;
    if (level === 'easy')        { mn = 10;  mx = 99;   }
    else if (level === 'medium') { mn = 10;  mx = 999;  }
    else                          { mn = 100; mx = 9999; }
    const a = rand(mn, mx);
    const b = rand(mn, a);
    return `${a} \u2212 ${b} =`;
  }
  if (type === 'mul') {
    let a, b;
    if (level === 'easy')        { a = rand(1,5);   b = rand(1,5);   }
    else if (level === 'medium') { a = rand(10,50); b = rand(2,9);   }
    else                          { a = rand(10,99); b = rand(10,99); }
    return `${a} \u00B7 ${b} =`;
  }
  if (type === 'div') {
    let a, b;
    if (level === 'easy') {
      b = rand(1,5);
      a = b * rand(1,5);
    } else if (level === 'medium') {
      b = rand(2,10);
      const kMin = Math.max(1, Math.ceil(10 / b));
      const kMax = Math.floor(100 / b);
      const k = rand(kMin, Math.max(kMin, kMax));
      a = b * k;
    } else {
      b = rand(2,30);
      const kMin = Math.max(1, Math.ceil(100 / b));
      const kMax = Math.floor(1000 / b);
      const k = rand(kMin, Math.max(kMin, kMax));
      a = b * k;
    }
    return `${a} : ${b} =`;
  }
  return '';
}

// Bygger innholdet til ett arbeidsark (én side) med kun én regneart.
// Antall oppgaver bestemmes av type + level i henhold til spec:
//   add/sub  : 12 oppgaver per side (3 kolonner × 4 rader)
//   mul/div lett+middels : 10 oppgaver (2 kolonner × 5 rader)
//   mul/div utfordrende : 4 oppgaver (2 kolonner × 2 rader)
//   txt : 2 oppgaver per side
function buildFullPageSection(type, level, monsterSrc, allowedOps) {
  // Tekstoppgaver: 2 per side, gjenbruker eksisterende buildTextSection-malstruktur
  // men vi droppper section-header siden tittelen står øverst på siden.
  if (type === 'txt') {
    const fullPool = TEXTS[level];
    const extraOps = ['eco','frac','pct','meas'];
    let pool = fullPool.filter(tmpl =>
      allowedOps.includes(tmpl.op) || extraOps.includes(tmpl.op)
    );
    if (pool.length === 0) pool = fullPool;

    // Bygg 2 ulike tekstoppgaver, prøv å unngå duplikater av samme mal
    const usedTmpls = [];
    const items = [];
    for (let n = 0; n < 2; n++) {
      let tmpl, a, b, ok = false;
      for (let tries = 0; tries < 100 && !ok; tries++) {
        // Prøv å unngå samme mal som forrige; tillat etter mange forsøk
        const candidates = tries < 40 ? pool.filter(t => !usedTmpls.includes(t)) : pool;
        const usePool = candidates.length > 0 ? candidates : pool;
        tmpl = usePool[rand(0, usePool.length-1)];
        [a, b] = tmpl.pick ? tmpl.pick() : pickNumbersForText(tmpl.op, level);
        ok = !tmpl.c || tmpl.c(a, b);
      }
      usedTmpls.push(tmpl);
      items.push(`
        <div class="txt-task-box txt-task-fullpage">
          <div class="txt-task-num">Oppgave ${n+1}</div>
          <div class="txt-task-monster-wrap">
            <img src="${monsterSrc}" alt="">
          </div>
          <div class="txt-problem">${tmpl.t(a,b)}</div>
          <div style="clear:both"></div>
          <div class="txt-answer-label">Svar og utregning:</div>
          ${makeTallGridField(60, 175)}
        </div>`);
    }
    return `<div class="txt-fullpage-wrap">${items.join('')}</div>`;
  }

  // Bestem antall oppgaver
  let count;
  if (type === 'add' || type === 'sub') {
    count = 16; // 4 kolonner × 4 rader
  } else if (type === 'mul' || type === 'div') {
    count = level === 'hard' ? 6 : 12; // hard: 2×3, ellers: 2×6
  } else {
    count = 10;
  }

  // Bestem grid og rute-størrelser. Alle dimensjoner snappes til hele ruter
  // (multiplum av 7 mm bredde og 10 mm høyde) inne i makeGridField, men vi
  // velger her ferdig snappede verdier slik at grid-cellene passer fint.
  let gridClass, gridW, gridH;
  if (type === 'add' || type === 'sub') {
    // 4 kolonner × 3 rader. Hvert skrivefelt: 6 kol × 5 rader = 42mm × 50mm
    gridClass = 'tasks-grid-4';
    gridW = 42; // 6 ruter à 7mm
    gridH = 50; // 5 rader à 10mm
  } else if (type === 'mul' || type === 'div') {
    if (level === 'hard') {
      // 2 kol × 2 rader, store ruter for oppstilt utregning: 12 kol × 7 rader
      gridClass = 'tasks-grid';
      gridW = 84; // 12 ruter à 7mm
      gridH = 70; // 7 rader à 10mm
    } else {
      // 2 kol × 5 rader: 12 kol × 3 rader skrivefelt
      gridClass = 'tasks-grid';
      gridW = 84; // 12 ruter à 7mm
      gridH = 30; // 3 rader à 10mm
    }
  }

  let tasks = [];
  for (let i = 0; i < count; i++) {
    const problem = generateProblem(type, level);
    tasks.push(`
      <div class="task-item">
        <div class="task-problem">
          <span class="task-num">${i+1}.</span>${problem}
        </div>
        ${makeGridField(gridH, gridW)}
      </div>`);
  }
  return `<div class="${gridClass}">${tasks.join('')}</div>`;
}

// Velg passende tall (a, b) for én tekstoppgavetype og nivå.
// Returnerer [a, b] som maler kan bruke, uavhengig av tmpl.c-sjekken
// (den kjøres fortsatt etterpå for ekstra sikring).
function pickNumbersForText(op, level) {
  // Regne­arts­nivåene matcher spesifikasjonen:
  //   add/sub easy  : 2+2 siffer (10–99)
  //   add/sub med   : 2–3 siffer (10–999)
  //   add/sub hard  : 3–4 siffer (100–9999)
  //   mul    easy   : 1–5 · 1–5
  //   mul    med    : 1-siffer · 10–50
  //   mul    hard   : 2-siffer · 2-siffer
  //   div    easy   : basert på 1–5 gangen
  //   div    med    : 10–100 delt på 2–10
  //   div    hard   : 100–1000 delt på 2–30
  if (op === 'add' || op === 'sub') {
    let mn, mx;
    if (level === 'easy')        { mn = 10;  mx = 99;   }
    else if (level === 'medium') { mn = 10;  mx = 999;  }
    else                          { mn = 100; mx = 9999; }
    const a = rand(mn, mx);
    // For sub: b ≤ a. For add: fritt, men samme skala.
    const b = op === 'sub' ? rand(mn, a) : rand(mn, mx);
    return [a, b];
  }
  if (op === 'mul') {
    if (level === 'easy')        return [rand(1,5),   rand(1,5)];
    if (level === 'medium')      return [rand(10,50), rand(2,9)];
    return [rand(10,99), rand(10,99)];
  }
  if (op === 'div') {
    let b, a;
    if (level === 'easy') {
      b = rand(1,5);
      a = b * rand(1,5);
    } else if (level === 'medium') {
      b = rand(2,10);
      const kMin = Math.max(1, Math.ceil(10 / b));
      const kMax = Math.floor(100 / b);
      a = b * rand(kMin, Math.max(kMin, kMax));
    } else {
      b = rand(2,30);
      const kMin = Math.max(1, Math.ceil(100 / b));
      const kMax = Math.floor(1000 / b);
      a = b * rand(kMin, Math.max(kMin, kMax));
    }
    return [a, b];
  }
  // Økonomi: priser/beløp i kroner (hard-nivå)
  if (op === 'eco') {
    // Velg pris 20–500, antall 2–12, eller beløp/pris som går opp
    const a = rand(50, 500);
    const b = rand(2, 12);
    return [a, b];
  }
  // Brøk: a må være delelig med b (2, 3 eller 4)
  if (op === 'frac') {
    const b = [2,3,4][rand(0,2)];
    const k = rand(4, 20); // 4·2 = 8 … 20·4 = 80
    const a = b * k;
    return [a, b];
  }
  // Prosent: velg prosenter som gir hele tall (10, 20, 25, 50)
  if (op === 'pct') {
    const pcts = [10, 20, 25, 50];
    const b = pcts[rand(0, pcts.length-1)];
    // a må være delelig med 100/gcd slik at a·b/100 blir heltall
    // 10% → delelig med 10, 20% → 5, 25% → 4, 50% → 2
    const step = b === 10 ? 10 : b === 20 ? 5 : b === 25 ? 4 : 2;
    const a = step * rand(20, 200); // gir priser 40–2000
    return [a, b];
  }
  // Måling: tall som passer meter/minutter/kg-oppgaver
  if (op === 'meas') {
    // Bruk blanding: lengde i hele 100-meter, eller minutter 30–180
    const a = rand(1, 10) * 500; // 500–5000 meter
    const b = rand(2, 7);
    return [a, b];
  }
  // Fallback
  return [rand(10, 100), rand(2, 10)];
}

function buildTextSection(monsterSrc, level, allowedOps) {
  const fullPool = TEXTS[level];

  // Filtrer poolen til kun maler som matcher valgte regnearter.
  // For hard-nivå inkluderer vi ALLTID de utvidede kategoriene
  // (eco/frac/pct/meas) fordi de er egne spesialoppgaver som ikke
  // er knyttet til de fire vanlige regneartene – eleven skal utsettes
  // for dem uavhengig av hvilke vanlige regnearter som er huket av.
  const extraOps = ['eco','frac','pct','meas'];
  let pool = fullPool.filter(tmpl =>
    allowedOps.includes(tmpl.op) || extraOps.includes(tmpl.op)
  );
  // Fallback: hvis ingen maler matcher (f.eks. brukeren valgte bare
  // "tekstoppgave" uten andre regnearter og vi er på easy/medium), bruk hele poolen.
  if (pool.length === 0) pool = fullPool;

  // Forsøk opptil 100 ganger å finne en gyldig (tmpl, a, b)-kombinasjon
  let tmpl, a, b, ok = false;
  for (let tries = 0; tries < 100 && !ok; tries++) {
    tmpl = pool[rand(0, pool.length-1)];
    // Nye maler har sin egen pick() som gir realistiske tall per scenario.
    // Fallback til den generiske pickNumbersForText hvis en eldre mal mangler pick.
    [a, b] = tmpl.pick ? tmpl.pick() : pickNumbersForText(tmpl.op, level);
    ok = !tmpl.c || tmpl.c(a, b);
  }

  return `
    <div class="section-hd">
      <div class="section-pill pill-txt">
        <img src="${monsterSrc}" alt="">
        Tekstoppgave
      </div>
      <div class="section-rule"></div>
    </div>
    <div class="txt-task-box">
      <div class="txt-task-monster-wrap">
        <img id="txt-monster-img" src="${monsterSrc}" alt="">
      </div>
      <div class="txt-problem">${tmpl.t(a,b)}</div>
      <div style="clear:both"></div>
      <div class="txt-answer-label">Svar og utregning:</div>
      ${makeTallGridField(50, 175)}
    </div>`;
}

// Bygger HTML for én worksheet-side (med header, info-rad, seksjoner, footer og hjørnedekor)
function buildPage(opts) {

// Omtrentlig høydebudsjett for innholdet på én A4-side (297mm minus padding/header/info/footer)
// Omtrentlig høydebudsjett for innholdet på én A4-side.
// Ved utskrift har vi 285mm tilgjengelig (297mm − 2·6mm @page margin),
// minus worksheet-padding (10mm topp + 14mm bunn = 24mm),
// minus header+info+footer (ca. 28mm). Gir ca. 230mm for seksjoner.
const PAGE_CONTENT_BUDGET_MM = 230;

// Estimert høyde i mm per seksjon.
// add/sub bruker 4-kolonne-layout med fast rutehøyde, så høyden er nær konstant.
// mul/div bruker 2-kolonne-layout: ceil(count/2) rader, høyde per rad varierer
// med nivå (utfordrende gir 7 rader = 70mm + padding ≈ 77.5mm per rad).
// tekstoppgave har ett spørsmål + et 50mm rutenett + padding.
function estimateSectionHeightMm(type, count, level) {
  if (type === 'add' || type === 'sub') return 67;
  if (type === 'mul' || type === 'div') {
    // På utfordrende nivå kappes count til 2 (samme logikk som i buildSection)
    const effectiveCount = level === 'hard' ? Math.min(count, 2) : count;
    const rowHeight = level === 'hard' ? 77.5 : 37.5;
    return 14 + Math.ceil(effectiveCount / 2) * rowHeight;
  }
  if (type === 'txt') return 85;
  return 0;
}

// Mapping fra type til etiketter, pill-klasse og symbol
const OP_META = {
  add: { label: 'Addisjon',      symbol: '+',  pillClass: 'pill-add' },
  sub: { label: 'Subtraksjon',   symbol: '−',  pillClass: 'pill-sub' },
  mul: { label: 'Multiplikasjon', symbol: '·', pillClass: 'pill-mul' },
  div: { label: 'Divisjon',      symbol: ':',  pillClass: 'pill-div' },
  txt: { label: 'Tekstoppgaver', symbol: '📖', pillClass: 'pill-txt' },
};

function generateWorksheet() {
  const cls       = document.getElementById('ctrl-class').value || '3. trinn';
  const level     = document.getElementById('ctrl-level').value;
  const numPages  = parseInt(document.getElementById('ctrl-pages').value) || 1;

  // Finn valgt regneart fra radio-knappene
  const opRadio = document.querySelector('input[name="op"]:checked');
  const op = opRadio ? opRadio.value : 'add';

  const meta = OP_META[op];
  const title = meta.label;

  // For tekstoppgaver: regn ut hvilke "vanlige" regnearter tekstoppgavepoolen
  // skal kunne trekke fra. På utfordrende-nivå er extraOps (eco/frac/pct/meas)
  // alltid med – på lett/middels begrenser vi til den valgte operasjonen
  // (eller bare tekstoppgaver, som er likt at alle vanlige er tillatt).
  // Når brukeren velger "tekstoppgave" alene gir vi tilgang til alle.
  const allowedOps = ['add','sub','mul','div'];

  // Plukk nok monster-bilder til alle sidene. Vi trenger 7 bilder per side
  // (header, content-monster, footer, 4 corners) + 4 reserve.
  // Når antall sider er stort gjenbruker pickN bilder pent.
  const totalImages = numPages * 7 + 4;
  const imgs = pickN(totalImages);

  // Hjelper: gir alltid et gyldig bilde, selv om indeksen er ute av grensene
  const img = (i) => imgs[i] || imgs[i % imgs.length] || MONSTER_IMGS[i % MONSTER_IMGS.length];

  let html = '';
  for (let p = 0; p < numPages; p++) {
    const offset = p * 7;
    // Generer innhold for én side
    const sectionsHtml = buildFullPageSection(op, level, img(offset + 1), allowedOps);

    const pageLabel = numPages > 1 ? `Side ${p+1} av ${numPages}` : null;

    html += buildPage({
      title,
      cls,
      sectionsHtml,
      headerMonster: img(offset),
      footerMonster: img(offset + 2),
      cornerTl: img(offset + 3),
      cornerTr: img(offset + 4),
      cornerBl: img(offset + 5),
      cornerBr: img(offset + 6),
      pageLabel
    });
  }

  const wrap = document.getElementById('worksheet-wrap');
  wrap.innerHTML = html;
}

// Init parade
(function(){
  const parade = document.getElementById('parade');
  // Bruk bare de 9 originale monstrene i paraden på forsiden
  const paradeMonsters = MONSTER_IMGS.slice(0, 9);

    const img = document.createElement('img');
    img.className='parade-monster'; img.src=src; img.alt='';
    parade.appendChild(img);
  });
  generateWorksheet();
})();
